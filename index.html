/* ─── OrbV2 ─────────────────────────────────────────────────────── */

const OrbV2 = ({ containerRef, themeColor = "#FF5C2A", scrollProgress = 0 }) => {
  const orbRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const targetRef = React.useRef({ x: 0.5, y: 0.5 });
  const currentRef = React.useRef({ x: 0.5, y: 0.4 });
  const tRef = React.useRef(0);

  React.useEffect(() => {
    const el = orbRef.current;
    if (!el) return;
    const container = containerRef?.current || el.parentElement;

    const onMove = (e) => {
      if (!container) return;
      const r = container.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width;
      const y = (e.clientY - r.top) / r.height;
      targetRef.current = { x: Math.max(0, Math.min(1, x)), y: Math.max(0, Math.min(1, y)) };
    };

    const tick = () => {
      tRef.current += 0.005;
      const t = tRef.current;
      const driftX = 0.5 + Math.sin(t * 0.6) * 0.18;
      const driftY = 0.4 + Math.cos(t * 0.5) * 0.14;
      const blend = 0.4;
      const tx = driftX * (1 - blend) + targetRef.current.x * blend;
      const ty = driftY * (1 - blend) + targetRef.current.y * blend;
      const ease = 0.05;
      currentRef.current.x += (tx - currentRef.current.x) * ease;
      currentRef.current.y += (ty - currentRef.current.y) * ease;
      const cx = currentRef.current.x * 100;
      const cy = currentRef.current.y * 100;
      el.style.transform = `translate3d(${cx - 50}%, ${cy - 50}%, 0) rotate(${Math.sin(t * 0.3) * 12}deg)`;
      rafRef.current = requestAnimationFrame(tick);
    };

    if (container) container.addEventListener("mousemove", onMove);
    rafRef.current = requestAnimationFrame(tick);
    return () => {
      cancelAnimationFrame(rafRef.current);
      if (container) container.removeEventListener("mousemove", onMove);
    };
  }, [containerRef]);

  const gradient = `radial-gradient(circle at 30% 30%, #FFE3B0 0%, ${themeColor} 35%, #FFB3D1 65%, #C7DBFF 100%)`;
  const size = 600 + scrollProgress * 200;

  return (
    <div
      ref={orbRef}
      style={{
        position: "absolute",
        left: "50%",
        top: "50%",
        width: size,
        height: size,
        marginLeft: -size / 2,
        marginTop: -size / 2,
        borderRadius: "50%",
        background: gradient,
        filter: "blur(40px) saturate(1.15)",
        opacity: 0.48,
        pointerEvents: "none",
        willChange: "transform, background",
        mixBlendMode: "multiply",
        transition: "background 1.2s ease, width 1s ease, height 1s ease, margin 1s ease",
      }}
    />
  );
};

/* ─── ArtfulName ────────────────────────────────────────────────── */

const ArtfulName = () => {
  const [phase, setPhase] = React.useState(0);
  const [hover, setHover] = React.useState(-1);

  React.useEffect(() => {
    const t = setTimeout(() => setPhase(1), 120);
    return () => clearTimeout(t);
  }, []);

  const words = ["Christina", "Doolan"];
  let gi = 0;

  return (
    <div
      data-cursor="art"
      style={{ position: "relative", width: "100%", userSelect: "none", cursor: "none" }}
    >
      <h1
        style={{
          margin: 0,
          fontFamily: '"Inter Tight", system-ui, sans-serif',
          fontWeight: 700,
          fontSize: "clamp(72px, 13.5vw, 232px)",
          lineHeight: 0.9,
          letterSpacing: "-0.045em",
          color: INK,
        }}
      >
        {words.map((word, wi) => (
          <span key={wi} style={{ display: "block", whiteSpace: "nowrap" }}>
            {word.split("").map((ch) => {
              const i = gi++;
              const isHover = hover === i;
              const enterDelay = 0.045 * i;
              const visible = phase >= 1;
              return (
                <span
                  key={i}
                  onMouseEnter={() => setHover(i)}
                  onMouseLeave={() => setHover(-1)}
                  style={{
                    display: "inline-block",
                    transform: visible ? "translate3d(0,0,0)" : "translate3d(0, 0.42em, 0)",
                    opacity: visible ? 1 : 0,
                    transition: `opacity 0.65s cubic-bezier(0.2,0.8,0.2,1) ${enterDelay}s, transform 0.8s cubic-bezier(0.2,1.1,0.3,1) ${enterDelay}s`,
                    willChange: "transform, opacity",
                  }}
                >
                  <span
                    style={{
                      display: "inline-block",
                      transform: isHover ? "translateY(-0.06em)" : "translateY(0)",
                      transition: "transform 0.35s cubic-bezier(0.2,1.1,0.3,1)",
                    }}
                  >
                    {ch}
                  </span>
                </span>
              );
            })}
            {wi === words.length - 1 && (
              <span
                style={{
                  display: "inline-block",
                  opacity: phase >= 1 ? 1 : 0,
                  transform: phase >= 1 ? "scale(1)" : "scale(0.4)",
                  transition: "opacity 0.6s ease 0.7s, transform 0.6s cubic-bezier(0.2,1.4,0.3,1) 0.7s",
                }}
              >
                .
              </span>
            )}
          </span>
        ))}
      </h1>
    </div>
  );
};

/* ─── ColorCursor ───────────────────────────────────────────────── */

const ColorCursor = ({ containerRef }) => {
  const [pos, setPos] = React.useState({ x: -100, y: -100 });
  const [variant, setVariant] = React.useState("default");
  const [visible, setVisible] = React.useState(false);

  React.useEffect(() => {
    const el = containerRef?.current;
    if (!el) return;

    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      setPos({ x: e.clientX - r.left, y: e.clientY - r.top });
      setVisible(true);
      let target = e.target;
      let v = "default";
      while (target && target !== el) {
        if (target.dataset && target.dataset.cursor) { v = target.dataset.cursor; break; }
        target = target.parentElement;
      }
      setVariant(v);
    };
    const onLeave = () => setVisible(false);

    el.addEventListener("mousemove", onMove);
    el.addEventListener("mouseleave", onLeave);
    return () => {
      el.removeEventListener("mousemove", onMove);
      el.removeEventListener("mouseleave", onLeave);
    };
  }, [containerRef]);

  const variants = {
    default: { size: 16,  color: "#FF5C2A", blend: "normal",    label: null },
    art:     { size: 28,  color: "#FFFFFF", blend: "difference", label: null },
    work:    { size: 90,  color: "#FF5C2A", blend: "normal",     label: "VIEW" },
    project: { size: 120, color: "#FF5C2A", blend: "normal",     label: "OPEN →" },
    footer:  { size: 60,  color: "#FF5C2A", blend: "normal",     label: "✶" },
    link:    { size: 36,  color: "#FF5C2A", blend: "normal",     label: null },
  };
  const v = variants[variant] || variants.default;

  return (
    <div
      style={{
        position: "absolute",
        left: pos.x,
        top: pos.y,
        width: v.size,
        height: v.size,
        marginLeft: -v.size / 2,
        marginTop: -v.size / 2,
        borderRadius: "50%",
        background: v.color,
        mixBlendMode: v.blend,
        pointerEvents: "none",
        zIndex: 100,
        transition: "width 0.25s cubic-bezier(0.2,0.9,0.2,1), height 0.25s cubic-bezier(0.2,0.9,0.2,1), margin 0.25s cubic-bezier(0.2,0.9,0.2,1), background 0.25s, opacity 0.2s",
        opacity: (visible && (variant === "art" || variant === "project")) ? 1 : 0,
        display: "flex",
        alignItems: "center",
        justifyContent: "center",
        color: "#fff",
        fontFamily: '"Inter Tight", sans-serif',
        fontSize: 11,
        fontWeight: 600,
        letterSpacing: "0.14em",
        textTransform: "uppercase",
      }}
    >
      {v.label}
    </div>
  );
};

const ScrollProjects = ({ onActiveChange }) => {
  const [active, setActive] = React.useState(0);
  const wrapperRef = React.useRef(null);
  const panelRef = React.useRef(null);
  const sectionRefs = React.useRef([]);
  const activeRef = React.useRef(0);
  const onChangeRef = React.useRef(onActiveChange);

  React.useEffect(() => { onChangeRef.current = onActiveChange; }, [onActiveChange]);

  React.useEffect(() => {
    let root = null;
    if (wrapperRef.current) {
      let p = wrapperRef.current.parentElement;
      while (p && p !== document.documentElement) {
        const ov = getComputedStyle(p).overflowY;
        if (ov === "auto" || ov === "scroll") { root = p; break; }
        p = p.parentElement;
      }
    }

    const update = () => {
      const wrapper = wrapperRef.current;
      if (!wrapper) return;

      const rootRect = root ? root.getBoundingClientRect() : { top: 0, height: window.innerHeight };

      // Active section: which section spans the scroll container center
      const screenCenter = rootRect.top + rootRect.height * 0.5;
      sectionRefs.current.forEach((el, i) => {
        if (!el) return;
        const r = el.getBoundingClientRect();
        if (r.top <= screenCenter && r.bottom >= screenCenter) {
          if (activeRef.current !== i) {
            activeRef.current = i;
            setActive(i);
            onChangeRef.current && onChangeRef.current(i, PROJECTS_V2[i]);
          }
        }
      });
    };

    const scroller = root || window;
    scroller.addEventListener("scroll", update, { passive: true });
    window.addEventListener("resize", update, { passive: true });
    const raf = requestAnimationFrame(update);
    return () => {
      scroller.removeEventListener("scroll", update);
      window.removeEventListener("resize", update);
      cancelAnimationFrame(raf);
    };
  }, []);

  const isMobile = useIsMobile();

  if (isMobile) {
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 48 }}>
        {PROJECTS_V2.map((p, i) => (
          <a
            key={p.id}
            href={p.link || "#"}
            style={{ textDecoration: "none", color: "inherit", display: "block", borderTop: i === 0 ? "none" : "1px solid rgba(10,14,26,0.1)", paddingTop: i === 0 ? 0 : 48 }}
          >
            <div style={{ position: "relative", aspectRatio: "4/3", borderRadius: 14, overflow: "hidden", background: p.thumbBg, marginBottom: 24 }}>
              {p.thumbImg && <img src={p.thumbImg} alt={p.title} style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: p.thumbFit || "cover", objectPosition: "center" }} />}
              <div style={{ position: "absolute", inset: 0, background: p.thumbType === "dark" ? "linear-gradient(to top, rgba(10,14,26,0.55) 0%, transparent 60%)" : "linear-gradient(to top, rgba(10,14,26,0.4) 0%, transparent 60%)" }} />
              <div style={{ position: "absolute", top: 14, left: 16, fontFamily: '"Inter Tight", sans-serif', fontSize: 11, letterSpacing: "0.14em", color: "rgba(255,255,255,0.8)", fontVariantNumeric: "tabular-nums" }}>{p.num} / 03</div>
            </div>
            <div style={{ fontFamily: '"Inter Tight", sans-serif', fontSize: 11, letterSpacing: "0.18em", textTransform: "uppercase", color: p.accent, marginBottom: 10, fontVariantNumeric: "tabular-nums" }}>
              {p.role.split("·")[0].trim()}
            </div>
            <div style={{ fontFamily: '"Inter Tight", sans-serif', fontWeight: 700, fontSize: "clamp(32px, 8vw, 52px)", lineHeight: 0.95, letterSpacing: "-0.04em", marginBottom: 16, color: "#0A0E1A" }}>
              {p.title}
            </div>
            <div style={{ fontSize: 16, lineHeight: 1.55, color: "rgba(10,14,26,0.78)", marginBottom: 20, textWrap: "pretty" }}>
              {p.desc}
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 20 }}>
              {p.metrics.map((m) => (
                <span key={m} style={{ padding: "6px 12px", border: `1px solid ${p.accent}55`, borderRadius: 999, fontSize: 11, color: p.accent, fontFamily: '"Inter Tight", sans-serif', letterSpacing: "0.04em" }}>{m}</span>
              ))}
            </div>
            <span style={{ fontFamily: '"Inter Tight", sans-serif', fontSize: 13, letterSpacing: "0.12em", textTransform: "uppercase", color: "#0A0E1A", borderBottom: `1px solid ${p.accent}`, paddingBottom: 3, fontWeight: 600 }}>
              Read case study →
            </span>
          </a>
        ))}
      </div>
    );
  }

  return (
    <div ref={wrapperRef} style={{ position: "relative", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 80 }}>
      <div style={{ display: "flex", flexDirection: "column" }}>
        {PROJECTS_V2.map((p, i) => (
          <div
            key={p.id}
            ref={(el) => (sectionRefs.current[i] = el)}
            data-idx={i}
            data-cursor="project"
            onClick={() => { if (p.link) window.location.href = p.link; }}
            style={{
              minHeight: "92vh",
              cursor: "none",
              display: "flex",
              flexDirection: "column",
              justifyContent: "center",
              padding: "60px 0",
              borderTop: i === 0 ? "none" : "1px solid rgba(10,14,26,0.1)",
            }}
          >
            <div
              style={{
                fontFamily: '"Inter Tight", sans-serif',
                fontSize: 12,
                letterSpacing: "0.18em",
                textTransform: "uppercase",
                color: p.accent,
                marginBottom: 24,
                fontVariantNumeric: "tabular-nums",
              }}
            >
              ({p.num} / 03) — {p.role.split("·")[0].trim()}
            </div>
            <div
              style={{
                fontFamily: '"Inter Tight", sans-serif',
                fontWeight: 700,
                fontSize: "clamp(64px, 8vw, 112px)",
                lineHeight: 0.92,
                letterSpacing: "-0.04em",
                marginBottom: 32,
                color: "#0A0E1A",
              }}
            >
              {p.title}
            </div>
            <div
              style={{
                fontSize: 11,
                letterSpacing: "0.14em",
                textTransform: "uppercase",
                color: "rgba(10,14,26,0.55)",
                marginBottom: 12,
              }}
            >
              {p.role}
            </div>
            <div
              style={{
                fontSize: 19,
                lineHeight: 1.5,
                color: "rgba(10,14,26,0.78)",
                maxWidth: 540,
                marginBottom: 40,
                textWrap: "pretty",
              }}
            >
              {p.desc}
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 10, marginBottom: 40 }}>
              {p.metrics.map((m) => (
                <span
                  key={m}
                  style={{
                    padding: "8px 14px",
                    border: `1px solid ${p.accent}55`,
                    borderRadius: 999,
                    fontSize: 12,
                    color: p.accent,
                    fontFamily: '"Inter Tight", sans-serif',
                    letterSpacing: "0.04em",
                  }}
                >
                  {m}
                </span>
              ))}
            </div>
            <a
              href={p.link || "#"}
              data-cursor="link"
              style={{
                fontFamily: '"Inter Tight", sans-serif',
                fontSize: 14,
                letterSpacing: "0.12em",
                textTransform: "uppercase",
                color: "#0A0E1A",
                textDecoration: "none",
                borderBottom: `1px solid ${p.accent}`,
                paddingBottom: 4,
                alignSelf: "flex-start",
                fontWeight: 600,
              }}
            >
              Read case study →
            </a>
          </div>
        ))}
      </div>

      <div style={{ position: "relative" }}>
        <div
          ref={panelRef}
          data-cursor="default"
          style={{
            position: "sticky",
            top: 80,
            width: "100%",
            height: "calc(100vh - 200px)",
            borderRadius: 18,
            overflow: "hidden",
            boxShadow: "0 30px 80px rgba(14,20,36,0.18), 0 6px 16px rgba(14,20,36,0.08)",
          }}
        >
          {PROJECTS_V2.map((p, i) => (
            <ProjectThumb key={p.id} p={p} active={i === active} />
          ))}
          <div
            style={{
              position: "absolute",
              top: 20,
              left: 20,
              padding: "6px 12px",
              borderRadius: 999,
              background: "rgba(255,255,255,0.92)",
              backdropFilter: "blur(8px)",
              fontFamily: '"Inter Tight", sans-serif',
              fontSize: 12,
              letterSpacing: "0.1em",
              textTransform: "uppercase",
              color: "rgba(0,0,0,0.7)",
              fontVariantNumeric: "tabular-nums",
            }}
          >
            {String(active + 1).padStart(2, "0")} / 03
          </div>
        </div>
      </div>
    </div>
  );
};

const HomepageKineticV2 = ({ onNavigate }) => {
  const containerRef = React.useRef(null);
  const [activeProject, setActiveProject] = React.useState(0);
  const [scrollProg, setScrollProg] = React.useState(0);

  React.useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    let scroller = el.parentElement;
    while (
      scroller &&
      getComputedStyle(scroller).overflowY !== "auto" &&
      getComputedStyle(scroller).overflowY !== "scroll"
    ) {
      if (scroller === document.body || scroller === document.documentElement) { scroller = null; break; }
      scroller = scroller.parentElement;
    }
    const target = scroller || window;
    const onScroll = () => {
      const node = scroller || document.documentElement;
      const max = (node.scrollHeight || 0) - (node.clientHeight || 0);
      if (!max || !Number.isFinite(max) || max <= 0) { setScrollProg(0); return; }
      const raw = (scroller ? node.scrollTop : window.scrollY) / max;
      const p = Number.isFinite(raw) ? Math.max(0, Math.min(1, raw)) : 0;
      setScrollProg(p);
    };
    target.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => target.removeEventListener("scroll", onScroll);
  }, []);

const PortfolioApp = () => {
  const initialTab = window.location.hash.slice(1) || new URLSearchParams(window.location.search).get("tab") || "home";
  const [tab, setTab] = React.useState(initialTab);
  const [isMobile, setIsMobile] = React.useState(window.innerWidth < 680);
  const scrollRef = React.useRef(null);

  React.useEffect(() => {
    const fn = () => setIsMobile(window.innerWidth < 680);
    window.addEventListener("resize", fn);
    return () => window.removeEventListener("resize", fn);
  }, []);

  const navigate = (t) => {
    setTab(t);
    window.scrollTo(0, 0);
  };

  React.useEffect(() => {
    window.scrollTo(0, 0);
  }, [tab]);

  return (
    <MobileCtx.Provider value={isMobile}>
      <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", background: "#F2EEE6" }}>
        <main
          style={{ flex: 1, overflowX: "hidden", position: "relative" }}
        >
          {tab === "home"      && <HomepageKineticV2 onNavigate={navigate} />}
          {tab === "portfolio" && <PortfolioView     onNavigate={navigate} />}
          {tab === "resume"    && <ResumeView        onNavigate={navigate} />}
        </main>
      </div>
    </MobileCtx.Provider>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<PortfolioApp />);
