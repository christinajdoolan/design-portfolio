<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Christina Doolan — iPad Navigation & Core Flow Redesign</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      html, body {
        background: #F2EEE6;
        font-family: "Inter Tight", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body { cursor: none; }
      a { color: inherit; text-decoration: none; }
      ::-webkit-scrollbar { width: 10px; }
      ::-webkit-scrollbar-track { background: #E8E2D4; }
      ::-webkit-scrollbar-thumb { background: rgba(10,14,26,0.2); border-radius: 5px; }
      #root { width: 100%; }
    </style>

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef, Fragment } = React;

      /* ─── DESIGN TOKENS ──────────────────────────────────────────────── */
      const C = {
        bg:        "#F2EEE6",
        card:      "#FFFFFF",
        ink:       "#0A0E1A",
        ink2:      "rgba(10,14,26,0.7)",
        ink3:      "rgba(10,14,26,0.5)",
        rule:      "rgba(10,14,26,0.12)",
        coral:     "#FF5C2A",
        coralSoft: "#FFE9DD",
      };
      const sans  = '"Inter Tight", system-ui, sans-serif';
      const serif = '"Instrument Serif", "Times New Roman", serif';

      /* ─── ORB V2 ─────────────────────────────────────────────────────── */
      const OrbV2 = ({ containerRef, themeColor = "#FF5C2A", scrollProgress = 0 }) => {
        const orbRef = useRef(null);
        const rafRef = useRef(null);
        const targetRef  = useRef({ x: 0.5, y: 0.5 });
        const currentRef = useRef({ x: 0.5, y: 0.4 });
        const tRef = useRef(0);

        useEffect(() => {
          const el = orbRef.current;
          if (!el) return;
          const container = containerRef?.current || el.parentElement;
          const onMove = (e) => {
            if (!container) return;
            const r = container.getBoundingClientRect();
            targetRef.current = {
              x: Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)),
              y: Math.max(0, Math.min(1, (e.clientY - r.top)  / r.height)),
            };
          };
          const tick = () => {
            tRef.current += 0.005;
            const t = tRef.current;
            const driftX = 0.5 + Math.sin(t * 0.6) * 0.18;
            const driftY = 0.4 + Math.cos(t * 0.5) * 0.14;
            const blend  = 0.4;
            const tx = driftX * (1 - blend) + targetRef.current.x * blend;
            const ty = driftY * (1 - blend) + targetRef.current.y * blend;
            const ease = 0.05;
            currentRef.current.x += (tx - currentRef.current.x) * ease;
            currentRef.current.y += (ty - currentRef.current.y) * ease;
            const cx = currentRef.current.x * 100;
            const cy = currentRef.current.y * 100;
            el.style.transform = `translate3d(${cx - 50}%, ${cy - 50}%, 0) rotate(${Math.sin(t * 0.3) * 12}deg)`;
            rafRef.current = requestAnimationFrame(tick);
          };
          if (container) container.addEventListener("mousemove", onMove);
          rafRef.current = requestAnimationFrame(tick);
          return () => {
            cancelAnimationFrame(rafRef.current);
            if (container) container.removeEventListener("mousemove", onMove);
          };
        }, [containerRef]);

        const gradient = `radial-gradient(circle at 30% 30%, #FFE3B0 0%, ${themeColor} 35%, #FFB3D1 65%, #C7DBFF 100%)`;
        const size = 600 + scrollProgress * 200;
        return (
          <div ref={orbRef} style={{
            position: "absolute", left: "50%", top: "50%",
            width: size, height: size,
            marginLeft: -size / 2, marginTop: -size / 2,
            borderRadius: "50%",
            background: gradient,
            filter: "blur(40px) saturate(1.15)",
            opacity: 0.78,
            pointerEvents: "none",
            willChange: "transform, background",
            mixBlendMode: "multiply",
            transition: "background 1.2s ease, width 1s ease, height 1s ease, margin 1s ease",
          }} />
        );
      };

      /* ─── COLOR CURSOR ───────────────────────────────────────────────── */
      const ColorCursor = ({ containerRef }) => {
        const [pos,     setPos]     = useState({ x: -200, y: -200 });
        const [variant, setVariant] = useState("default");
        const [visible, setVisible] = useState(false);

        useEffect(() => {
          const el = containerRef?.current;
          if (!el) return;
          const onMove = (e) => {
            const r = el.getBoundingClientRect();
            setPos({ x: e.clientX - r.left, y: e.clientY - r.top });
            setVisible(true);
            let t = e.target; let v = "default";
            while (t && t !== el) {
              if (t.dataset?.cursor) { v = t.dataset.cursor; break; }
              t = t.parentElement;
            }
            setVariant(v);
          };
          const onLeave = () => setVisible(false);
          el.addEventListener("mousemove", onMove);
          el.addEventListener("mouseleave", onLeave);
          return () => { el.removeEventListener("mousemove", onMove); el.removeEventListener("mouseleave", onLeave); };
        }, [containerRef]);

        const variants = {
          default: { size: 16,  color: "#FF5C2A", blend: "normal",    label: null },
          art:     { size: 28,  color: "#FFFFFF", blend: "difference", label: null },
          footer:  { size: 60,  color: "#FF5C2A", blend: "normal",     label: "✶" },
          link:    { size: 36,  color: "#FF5C2A", blend: "normal",     label: null },
        };
        const v = variants[variant] || variants.default;

        return (
          <div style={{
            position: "fixed",
            left: pos.x, top: pos.y,
            width: v.size, height: v.size,
            marginLeft: -v.size / 2, marginTop: -v.size / 2,
            borderRadius: "50%", background: v.color,
            mixBlendMode: v.blend,
            pointerEvents: "none", zIndex: 9999,
            transition: "width .25s cubic-bezier(.2,.9,.2,1), height .25s cubic-bezier(.2,.9,.2,1), margin .25s cubic-bezier(.2,.9,.2,1), background .25s, opacity .2s",
            opacity: visible ? 1 : 0,
            display: "flex", alignItems: "center", justifyContent: "center",
            color: "#fff", fontFamily: sans, fontSize: 11, fontWeight: 600,
            letterSpacing: "0.14em", textTransform: "uppercase",
          }}>
            {v.label}
          </div>
        );
      };

      /* ─── REUSABLE PRIMITIVES ────────────────────────────────────────── */
      const Label = ({ children, color = C.coral }) => (
        <div style={{ fontFamily: sans, fontSize: 11, letterSpacing: "0.18em", textTransform: "uppercase", color, fontWeight: 600, marginBottom: 14 }}>{children}</div>
      );

      const SectionTitle = ({ children, italic = false, size = 56 }) => (
        <h2 style={{ fontFamily: italic ? serif : sans, fontStyle: italic ? "italic" : "normal", fontWeight: italic ? 400 : 600, fontSize: size, lineHeight: 1.02, letterSpacing: italic ? "-0.015em" : "-0.03em", color: C.ink, margin: 0 }}>{children}</h2>
      );

      const Body = ({ children, size = 17, color = C.ink2 }) => (
        <p style={{ fontFamily: sans, fontSize: size, lineHeight: 1.6, color, margin: "0 0 16px" }}>{children}</p>
      );

      const Rule = () => <div style={{ height: 1, background: C.rule }} />;

      const TwoCol = ({ left, right, gap = 80 }) => (
        <div style={{ display: "grid", gridTemplateColumns: "35fr 60fr", gap }}>
          <div>{left}</div>
          <div>{right}</div>
        </div>
      );

      /* ─── IPAD FRAME ─────────────────────────────────────────────────── */
      const IPad = ({ children, label, style = {}, screenBg = "#fff" }) => (
        <div style={{ width: "100%", ...style }}>
          <div style={{ aspectRatio: "4 / 3", borderRadius: 22, border: `2px solid ${C.ink}`, background: "#0A0E1A", padding: 10, position: "relative", boxShadow: "0 4px 20px rgba(10,14,26,0.08)" }}>
            <div style={{ position: "absolute", inset: 10, borderRadius: 14, background: screenBg, overflow: "hidden" }}>
              {/* Status bar */}
              <div style={{ height: 22, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 14px", fontFamily: sans, fontSize: 9, color: C.ink, fontWeight: 600, letterSpacing: "0.04em" }}>
                <span>09:41 · HND</span>
                <span style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  <span>5G</span><span>·</span>
                  <span style={{ display: "inline-block", width: 18, height: 8, border: `1px solid ${C.ink}`, borderRadius: 2, position: "relative" }}>
                    <span style={{ position: "absolute", inset: 1, right: 6, background: C.ink, borderRadius: 1 }} />
                  </span>
                </span>
              </div>
              <div style={{ position: "absolute", inset: "22px 0 0 0" }}>{children}</div>
            </div>
          </div>
          {label && (
            <div style={{ fontFamily: sans, fontSize: 10, letterSpacing: "0.14em", textTransform: "uppercase", color: C.ink3, textAlign: "center", marginTop: 10 }}>{label}</div>
          )}
        </div>
      );

      /* ─── RAMP OPS SCREEN MOCK ───────────────────────────────────────── */
      const RampOpsScreen = ({ variant = "task", light = true }) => {
        const bg      = light ? "#F8F6F1" : "#0F121C";
        const surface = light ? "#FFFFFF"  : "#181C28";
        const text    = light ? C.ink      : "#F5F3EE";
        const subtext = light ? C.ink3     : "rgba(245,243,238,0.55)";
        const ruleC   = light ? C.rule     : "rgba(255,255,255,0.08)";

        if (variant === "nav") {
          return (
            <div style={{ width: "100%", height: "100%", background: bg, display: "flex", flexDirection: "column" }}>
              <div style={{ display: "flex", gap: 4, padding: "10px 14px", borderBottom: `1px solid ${ruleC}`, alignItems: "center" }}>
                <div style={{ width: 18, height: 18, borderRadius: 4, background: C.coral }} />
                {["Shift", "Flights", "Crew", "Tasks", "Equip."].map((t, i) => (
                  <div key={t} style={{ fontFamily: sans, fontSize: 9, fontWeight: 600, color: i === 2 ? "#fff" : text, background: i === 2 ? C.ink : "transparent", padding: "4px 9px", borderRadius: 999, letterSpacing: "0.02em" }}>{t}</div>
                ))}
                <div style={{ marginLeft: "auto", display: "flex", gap: 6, alignItems: "center" }}>
                  <div style={{ width: 6, height: 6, borderRadius: 999, background: "#2E7B4E" }} />
                  <span style={{ fontFamily: sans, fontSize: 8, color: subtext, letterSpacing: "0.08em" }}>RADIO 7 · LIVE</span>
                </div>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "120px 1fr 130px", gap: 0, flex: 1 }}>
                <div style={{ borderRight: `1px solid ${ruleC}`, padding: "10px 8px" }}>
                  {["LM K. Sato", "Crew of 8", "Bay 18 · 21 · 24"].map((s, i) => (
                    <div key={s} style={{ fontFamily: sans, fontSize: 8, color: i === 0 ? text : subtext, fontWeight: i === 0 ? 700 : 500, marginBottom: 6, lineHeight: 1.4 }}>{s}</div>
                  ))}
                  <div style={{ marginTop: 10, fontFamily: sans, fontSize: 7, color: subtext, letterSpacing: "0.14em" }}>CREW</div>
                  {["Tanaka", "Suzuki", "Watanabe", "Ito"].map((n, i) => (
                    <div key={n} style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 4 }}>
                      <div style={{ width: 12, height: 12, borderRadius: 999, background: i === 1 ? "#FFE3CC" : ruleC, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: sans, fontSize: 6, color: text, fontWeight: 700 }}>{n[0]}</div>
                      <div style={{ fontFamily: sans, fontSize: 7, color: text }}>{n}</div>
                      {i === 1 && <div style={{ marginLeft: "auto", width: 5, height: 5, borderRadius: 999, background: C.coral }} />}
                    </div>
                  ))}
                </div>
                <div style={{ padding: "10px 12px", overflow: "hidden" }}>
                  {[
                    { code: "NH204", time: "09:18 → 10:05", bay: "Bay 18", state: "OFFBLOCK · 18m",    warn: false, due: "Pushback 09:36" },
                    { code: "NH872", time: "09:42 → 11:20", bay: "Bay 21", state: "Fueling 02:14",     warn: false, due: "Bag offload due" },
                    { code: "NH318", time: "10:05 → 12:40", bay: "Bay 24", state: "Crew unassigned",   warn: true,  due: "Action required" },
                    { code: "NH426", time: "10:30 → 13:15", bay: "Bay 18", state: "Tentative",         warn: false, due: "Holds until 09:55" },
                  ].map((t) => (
                    <div key={t.code} style={{ background: surface, border: `1px solid ${t.warn ? C.coral : ruleC}`, borderRadius: 8, padding: "8px 10px", marginBottom: 6, display: "grid", gridTemplateColumns: "44px 1fr 90px 60px", alignItems: "center", gap: 8 }}>
                      <div style={{ fontFamily: sans, fontWeight: 700, fontSize: 11, color: text, letterSpacing: "-0.01em" }}>{t.code}</div>
                      <div>
                        <div style={{ fontFamily: sans, fontSize: 8, color: subtext, fontVariantNumeric: "tabular-nums" }}>{t.time}</div>
                        <div style={{ fontFamily: sans, fontSize: 8, color: text, fontWeight: 600, marginTop: 2 }}>{t.bay}</div>
                      </div>
                      <div style={{ fontFamily: sans, fontSize: 8, color: t.warn ? C.coral : text, fontWeight: 600 }}>{t.state}</div>
                      <div style={{ fontFamily: sans, fontSize: 7, color: subtext, fontVariantNumeric: "tabular-nums", textAlign: "right" }}>{t.due}</div>
                    </div>
                  ))}
                </div>
                <div style={{ borderLeft: `1px solid ${ruleC}`, padding: "10px 8px" }}>
                  <div style={{ fontFamily: sans, fontSize: 7, color: subtext, letterSpacing: "0.14em" }}>NEXT UP</div>
                  <div style={{ fontFamily: sans, fontSize: 10, fontWeight: 700, color: text, marginTop: 6 }}>09:36</div>
                  <div style={{ fontFamily: sans, fontSize: 8, color: subtext }}>Pushback NH204</div>
                  <button style={{ marginTop: 10, width: "100%", background: C.coral, color: "#fff", border: "none", padding: "8px 6px", borderRadius: 6, fontFamily: sans, fontSize: 9, fontWeight: 700, letterSpacing: "0.04em", cursor: "none" }}>ACKNOWLEDGE</button>
                  <div style={{ marginTop: 10, fontFamily: sans, fontSize: 7, color: subtext, letterSpacing: "0.14em" }}>BATTERY</div>
                  <div style={{ marginTop: 4, fontFamily: sans, fontSize: 11, fontWeight: 700, color: text, fontVariantNumeric: "tabular-nums" }}>74%</div>
                </div>
              </div>
            </div>
          );
        }

        // task / shift view
        return (
          <div style={{ width: "100%", height: "100%", background: bg, display: "flex", flexDirection: "column" }}>
            <div style={{ display: "flex", gap: 4, padding: "10px 14px", borderBottom: `1px solid ${ruleC}`, alignItems: "center" }}>
              <div style={{ width: 18, height: 18, borderRadius: 4, background: C.coral }} />
              {["Shift", "Flights", "Crew", "Tasks", "Equip."].map((t, i) => (
                <div key={t} style={{ fontFamily: sans, fontSize: 9, fontWeight: 600, color: i === 3 ? "#fff" : text, background: i === 3 ? C.ink : "transparent", padding: "4px 9px", borderRadius: 999 }}>{t}</div>
              ))}
              <div style={{ marginLeft: "auto", fontFamily: sans, fontSize: 8, color: subtext, letterSpacing: "0.08em" }}>SHIFT 06:00–18:00 · LM K. SATO</div>
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 220px", flex: 1 }}>
              <div style={{ padding: "10px 14px", overflow: "hidden" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", marginBottom: 8 }}>
                  <div>
                    <div style={{ fontFamily: sans, fontSize: 8, color: subtext, letterSpacing: "0.14em" }}>NH204 · BAY 18 · A350-900</div>
                    <div style={{ fontFamily: sans, fontWeight: 700, fontSize: 16, color: text, letterSpacing: "-0.02em", marginTop: 2 }}>Turnaround · 18 min to pushback</div>
                  </div>
                  <div style={{ fontFamily: sans, fontSize: 9, fontWeight: 700, color: C.coral, padding: "3px 8px", border: `1px solid ${C.coral}`, borderRadius: 999, letterSpacing: "0.08em" }}>OFFBLOCK</div>
                </div>
                {/* progress bar */}
                <div style={{ height: 8, borderRadius: 4, background: ruleC, position: "relative", marginBottom: 12 }}>
                  <div style={{ position: "absolute", inset: 0, width: "62%", background: C.coral, borderRadius: 4 }} />
                  <div style={{ position: "absolute", left: "62%", top: -3, width: 14, height: 14, borderRadius: 999, background: "#fff", border: `2px solid ${C.coral}` }} />
                </div>
                {[
                  { t: "Walk-around", time: "08:58",         state: "Confirmed",         by: "Tanaka",    done: true  },
                  { t: "Fueling",     time: "09:02 — 09:24", state: "In progress · 02:14", by: "Suzuki",  active: true },
                  { t: "Bag offload", time: "09:08",         state: "Awaiting ack",      by: "Watanabe",  warn: true  },
                  { t: "Catering",    time: "09:14",         state: "On-time",           by: "Ito"                    },
                ].map((row, i) => (
                  <div key={i} style={{ display: "grid", gridTemplateColumns: "16px 1fr 110px 60px", gap: 8, alignItems: "center", background: row.active ? (light ? "#FFF3EA" : "rgba(255,92,42,0.12)") : surface, border: `1px solid ${row.warn ? C.coral : ruleC}`, borderRadius: 8, padding: "8px 10px", marginBottom: 5 }}>
                    <div style={{ width: 14, height: 14, borderRadius: 4, border: `2px solid ${row.done ? "#2E7B4E" : row.warn ? C.coral : subtext}`, background: row.done ? "#2E7B4E" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontSize: 8, fontWeight: 800 }}>{row.done ? "✓" : ""}</div>
                    <div>
                      <div style={{ fontFamily: sans, fontSize: 10, fontWeight: 700, color: text }}>{row.t}</div>
                      <div style={{ fontFamily: sans, fontSize: 8, color: subtext, fontVariantNumeric: "tabular-nums", marginTop: 1 }}>{row.time}</div>
                    </div>
                    <div style={{ fontFamily: sans, fontSize: 9, color: row.warn ? C.coral : text, fontWeight: 600 }}>{row.state}</div>
                    <div style={{ fontFamily: sans, fontSize: 8, color: subtext, textAlign: "right" }}>{row.by}</div>
                  </div>
                ))}
              </div>
              <div style={{ borderLeft: `1px solid ${ruleC}`, padding: "10px 12px" }}>
                <div style={{ fontFamily: sans, fontSize: 7, color: subtext, letterSpacing: "0.14em" }}>UPCOMING · UNCONFIRMED</div>
                {[["09:42","NH872 · fuel"],["10:05","NH318 · tow"],["10:30","NH426 · bag load"]].map(([t, l]) => (
                  <div key={t} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: `1px dashed ${ruleC}` }}>
                    <div style={{ fontFamily: sans, fontSize: 9, color: text, fontWeight: 700, fontVariantNumeric: "tabular-nums" }}>{t}</div>
                    <div style={{ fontFamily: sans, fontSize: 8, color: subtext }}>{l}</div>
                  </div>
                ))}
                <div style={{ marginTop: 14, fontFamily: sans, fontSize: 7, color: subtext, letterSpacing: "0.14em" }}>BREAK</div>
                <div style={{ marginTop: 4, fontFamily: sans, fontSize: 11, fontWeight: 700, color: text, fontVariantNumeric: "tabular-nums" }}>11:15 — 11:45</div>
                <button style={{ marginTop: 14, width: "100%", background: C.ink, color: "#fff", border: "none", padding: "10px 8px", borderRadius: 8, fontFamily: sans, fontSize: 10, fontWeight: 700, letterSpacing: "0.06em", cursor: "none" }}>ACKNOWLEDGE TASK</button>
              </div>
            </div>
          </div>
        );
      };

      /* ─── WIREFRAME BODIES ───────────────────────────────────────────── */
      const WireBody = ({ kind }) => {
        const bar = (key, h, w = "100%", color = C.rule) => (
          <div key={key} style={{ height: h, width: w, background: color, borderRadius: 3 }} />
        );
        if (kind === "left") return (
          <div style={{ display: "grid", gridTemplateColumns: "70px 1fr", gap: 0, height: "100%", padding: 10 }}>
            <div style={{ background: C.rule, borderRadius: 6, padding: 6, display: "flex", flexDirection: "column", gap: 6 }}>
              {Array.from({ length: 5 }).map((_, i) => <div key={i} style={{ height: 8, background: "rgba(255,255,255,0.6)", borderRadius: 2 }} />)}
            </div>
            <div style={{ padding: 8, display: "flex", flexDirection: "column", gap: 6 }}>
              {bar("a",10,"50%")}{bar("b",28)}{bar("c",28)}{bar("d",28)}{bar("e",28)}
            </div>
          </div>
        );
        if (kind === "topcards") return (
          <div style={{ padding: 10, display: "flex", flexDirection: "column", gap: 6 }}>
            <div style={{ display: "flex", gap: 4 }}>{Array.from({ length: 5 }).map((_, i) => bar("t"+i, 10, 44, i===1 ? C.coral : C.rule))}</div>
            {[1,2,3,4].map(i => (
              <div key={i} style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 4 }}>
                {bar("a",20)}{bar("b",20)}{bar("c",20)}
              </div>
            ))}
          </div>
        );
        if (kind === "rightcrew") return (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 80px", gap: 0, height: "100%", padding: 10 }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>{bar("a",12,"60%")}{bar("b",34)}{bar("c",34)}{bar("d",34)}</div>
            <div style={{ background: C.rule, marginLeft: 8, borderRadius: 6, padding: 8 }}>
              {Array.from({ length: 6 }).map((_, i) => (
                <div key={i} style={{ display: "flex", gap: 4, alignItems: "center", marginBottom: 5 }}>
                  <div style={{ width: 10, height: 10, borderRadius: 999, background: "rgba(255,255,255,0.65)" }} />
                  <div style={{ flex: 1, height: 4, background: "rgba(255,255,255,0.55)", borderRadius: 2 }} />
                </div>
              ))}
            </div>
          </div>
        );
        if (kind === "timeline") return (
          <div style={{ padding: 10 }}>
            {bar("hdr", 8, "40%")}
            <div style={{ height: 12, background: C.rule, borderRadius: 6, marginTop: 12, position: "relative" }}>
              <div style={{ position: "absolute", left: "20%", top: 0, bottom: 0, width: "35%", background: C.coral, borderRadius: 6 }} />
            </div>
            <div style={{ marginTop: 14, display: "grid", gridTemplateColumns: "repeat(8, 1fr)", gap: 3 }}>
              {Array.from({ length: 8 }).map((_, i) => bar("col"+i, 28, "auto"))}
            </div>
          </div>
        );
        if (kind === "grid") return (
          <div style={{ padding: 10, display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gridAutoRows: "1fr", gap: 5, height: "100%" }}>
            {Array.from({ length: 12 }).map((_, i) => (
