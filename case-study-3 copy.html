// ─── OrbV2 ────────────────────────────────────────────────────────────────
const OrbV2 = ({ containerRef, themeColor = "#FF5C2A", scrollProgress = 0 }) => {
  const orbRef = React.useRef(null);
  const rafRef = React.useRef(null);
  const targetRef = React.useRef({ x: 0.5, y: 0.5 });
  const currentRef = React.useRef({ x: 0.5, y: 0.4 });
  const tRef = React.useRef(0);

  React.useEffect(() => {
    const el = orbRef.current;
    if (!el) return;
    const container = containerRef?.current || el.parentElement;

    const onMove = (e) => {
      if (!container) return;
      const r = container.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width;
      const y = (e.clientY - r.top) / r.height;
      targetRef.current = { x: Math.max(0, Math.min(1, x)), y: Math.max(0, Math.min(1, y)) };
    };

    const tick = () => {
      tRef.current += 0.005;
      const t = tRef.current;
      const driftX = 0.5 + Math.sin(t * 0.6) * 0.18;
      const driftY = 0.4 + Math.cos(t * 0.5) * 0.14;
      const blend = 0.4;
      const tx = driftX * (1 - blend) + targetRef.current.x * blend;
      const ty = driftY * (1 - blend) + targetRef.current.y * blend;
      const ease = 0.05;
      currentRef.current.x += (tx - currentRef.current.x) * ease;
      currentRef.current.y += (ty - currentRef.current.y) * ease;
      const cx = currentRef.current.x * 100;
      const cy = currentRef.current.y * 100;
      el.style.transform = `translate3d(${cx - 50}%, ${cy - 50}%, 0) rotate(${Math.sin(t * 0.3) * 12}deg)`;
      rafRef.current = requestAnimationFrame(tick);
    };

    if (container) container.addEventListener("mousemove", onMove);
    rafRef.current = requestAnimationFrame(tick);
    return () => {
      cancelAnimationFrame(rafRef.current);
      if (container) container.removeEventListener("mousemove", onMove);
    };
  }, [containerRef]);

  const gradient = `radial-gradient(circle at 30% 30%, #FFE3B0 0%, ${themeColor} 35%, #FFB3D1 65%, #C7DBFF 100%)`;
  const size = 600 + scrollProgress * 200;

  return (
    <div
      ref={orbRef}
      style={{
        position: "absolute",
        left: "50%",
        top: "50%",
        width: size,
        height: size,
        marginLeft: -size / 2,
        marginTop: -size / 2,
        borderRadius: "50%",
        background: gradient,
        filter: "blur(40px) saturate(1.15)",
        opacity: 0.78,
        pointerEvents: "none",
        willChange: "transform, background",
        mixBlendMode: "multiply",
        transition: "background 1.2s ease, width 1s ease, height 1s ease, margin 1s ease",
      }}
    />
  );
};

// ─── ColorCursor ──────────────────────────────────────────────────────────
const ColorCursor = () => {
  const [pos, setPos] = React.useState({ x: -100, y: -100 });
  const [variant, setVariant] = React.useState("default");
  const [visible, setVisible] = React.useState(false);

  React.useEffect(() => {
    const onMove = (e) => {
      setPos({ x: e.clientX, y: e.clientY });
      setVisible(true);
      let target = e.target;
      let v = "default";
      while (target) {
        if (target.dataset && target.dataset.cursor) { v = target.dataset.cursor; break; }
        target = target.parentElement;
      }
      setVariant(v);
    };
    const onLeave = () => setVisible(false);
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseleave", onLeave);
    return () => {
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseleave", onLeave);
    };
  }, []);

  const variants = {
    default: { size: 16, color: "#FF5C2A", blend: "normal", label: null },
    art:     { size: 28, color: "#FFFFFF", blend: "difference", label: null },
    work:    { size: 90, color: "#FF5C2A", blend: "normal", label: "VIEW" },
    project: { size: 120, color: "#FF5C2A", blend: "normal", label: "OPEN →" },
    footer:  { size: 60, color: "#FF5C2A", blend: "normal", label: "✶" },
    link:    { size: 36, color: "#FF5C2A", blend: "normal", label: null },
  };
  const v = variants[variant] || variants.default;

  return (
    <div style={{
      position: "fixed",
      left: pos.x,
      top: pos.y,
      width: v.size,
      height: v.size,
      marginLeft: -v.size / 2,
      marginTop: -v.size / 2,
      borderRadius: "50%",
      background: v.color,
      mixBlendMode: v.blend,
      pointerEvents: "none",
      zIndex: 9999,
      transition: "width 0.25s cubic-bezier(0.2,0.9,0.2,1), height 0.25s cubic-bezier(0.2,0.9,0.2,1), margin 0.25s cubic-bezier(0.2,0.9,0.2,1), background 0.25s, opacity 0.2s",
      opacity: visible ? 1 : 0,
      display: "flex",
      alignItems: "center",
      justifyContent: "center",
      color: "#fff",
      fontFamily: '"Inter Tight", sans-serif',
      fontSize: 11,
      fontWeight: 600,
      letterSpacing: "0.14em",
      textTransform: "uppercase",
    }}>
      {v.label}
    </div>
  );
};

// ─── The Pipeline ─────────────────────────────────────────────────────────
const Pipeline = () => {
  const stages = [
    { name: "Listen",    sub: "Open-ended interviews", color: "#9CCBA0", desc: "What's the actual job? What gets harder if we get this wrong?" },
    { name: "Reframe",   sub: "Problem statement",     color: "#A8C8E8", desc: "What's the smallest version of this that's still useful?" },
    { name: "Map",       sub: "Scope & tradeoffs",     color: "#C7A8E8", desc: "What MUST ship · what SHOULD · what WON'T (and why)" },
    { name: "Prototype", sub: "Lo-fi → hi-fi",         color: "#FFC9A8", desc: "Get something fake in stakeholders' hands within 5 days" },
    { name: "Ship",      sub: "Phased rollout",        color: C.coral,   desc: "Beta → pilot customer → general availability" },
  ];
  return (
    <section style={{ padding: "60px 64px 120px", maxWidth: 1280, margin: "0 auto" }}>
      <Label>The pipeline</Label>
      <STitle size={48}>How an <I>ask</I> becomes a <I>feature</I></STitle>
      <div style={{ maxWidth: 720, marginTop: 16, marginBottom: 60 }}>
        <Body size={17}>Same five stages every time. Different timeline (a billing feature might spend 3 weeks in Reframe; a photo-capture feature can ship from Listen to Beta in 4 weeks). The discipline is in not skipping stages — even when stakeholders want to.</Body>
      </div>
      <div style={{ background: C.card, borderRadius: 18, padding: 40, boxShadow: "0 2px 12px rgba(0,0,0,0.06)" }}>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 20, position: "relative" }}>
          {stages.map((s, i) => (
            <div key={s.name} style={{ position: "relative" }}>
              <div style={{ width: 64, height: 64, borderRadius: "50%", background: s.color, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: sans, fontWeight: 700, fontSize: 18, color: C.ink, marginBottom: 18 }}>0{i + 1}</div>
              <div style={{ fontFamily: serif, fontStyle: "italic", fontSize: 26, color: C.ink, marginBottom: 4 }}>{s.name}</div>
              <div style={{ fontFamily: sans, fontSize: 11, color: C.ink3, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 12 }}>{s.sub}</div>
              <div style={{ fontFamily: sans, fontSize: 13, color: C.ink2, lineHeight: 1.5 }}>{s.desc}</div>
              {i < stages.length - 1 && (
                <div style={{ position: "absolute", top: 28, right: -14, color: C.ink3, fontSize: 18 }}>→</div>
              )}
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};

// ─── Back to top ──────────────────────────────────────────────────────────
const BackToTop = () => {
  const [show, setShow] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => setShow(window.scrollY > 400);
    window.addEventListener("scroll", onScroll);
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
  return (
    <button
      onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
      data-cursor="link"
      style={{
        position: "fixed", bottom: 32, right: 32, zIndex: 50,
        width: 48, height: 48, borderRadius: "50%",
        background: C.card, border: `1px solid ${C.rule}`,
        boxShadow: "0 4px 20px rgba(0,0,0,0.12)",
        display: "flex", alignItems: "center", justifyContent: "center",
        fontFamily: sans, fontSize: 18, color: C.ink,
        cursor: "none",
        opacity: show ? 1 : 0,
        pointerEvents: show ? "auto" : "none",
        transition: "opacity 0.3s",
      }}
    >↑</button>
  );
};

const PasswordGate = ({ children }) => {
  const [unlocked, setUnlocked] = React.useState(() => localStorage.getItem('cs_auth') === 'ok');
  const [val, setVal] = React.useState('');
  const [err, setErr] = React.useState(false);
  if (unlocked) return children;
  const submit = (e) => {
    e.preventDefault();
    if (val === 'casestudies') { localStorage.setItem('cs_auth', 'ok'); setUnlocked(true); }
    else { setErr(true); setVal(''); }
  };
  return (
    <div style={{ minHeight:'100vh', background:'#F2EEE6', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', fontFamily:'"Inter Tight", system-ui, sans-serif', cursor:'default' }}>
      <div style={{ marginBottom:12, fontSize:11, letterSpacing:'0.18em', textTransform:'uppercase', color:'rgba(10,14,26,0.45)' }}>Portfolio · Protected</div>
      <div style={{ fontSize:36, fontWeight:700, letterSpacing:'-0.03em', color:'#0A0E1A', marginBottom:10 }}>Enter password</div>
      <div style={{ fontSize:16, color:'rgba(10,14,26,0.55)', marginBottom:44 }}>This case study is password protected.</div>
      <form onSubmit={submit} style={{ display:'flex', flexDirection:'column', gap:12, width:320 }}>
        <input type="password" value={val} onChange={e => { setVal(e.target.value); setErr(false); }} placeholder="Password" autoFocus
          style={{ padding:'14px 18px', borderRadius:12, border:`1.5px solid ${err ? '#FF5C2A' : 'rgba(10,14,26,0.18)'}`, background:'#fff', fontSize:16, color:'#0A0E1A', outline:'none', fontFamily:'"Inter Tight", system-ui, sans-serif' }} />
        {err && <div style={{ fontSize:13, color:'#FF5C2A' }}>Incorrect password — try again.</div>}
        <button type="submit" style={{ padding:'14px', borderRadius:12, background:'#0A0E1A', color:'#F2EEE6', fontSize:13, fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase', border:'none', cursor:'pointer', fontFamily:'"Inter Tight", system-ui, sans-serif' }}>Unlock →</button>
      </form>
    </div>
  );
};
ReactDOM.createRoot(document.getElementById("root")).render(<PasswordGate><CaseStudy3 /></PasswordGate>);
