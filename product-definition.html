<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Christina Doolan — Stakeholder-to-Feature Pipeline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      html { overflow-x: hidden; }
      html, body { background: #F2EEE6; font-family: "Inter Tight", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
      a { color: inherit; text-decoration: none; }
      ::-webkit-scrollbar { width: 10px; }
      ::-webkit-scrollbar-track { background: #E8E2D4; }
      ::-webkit-scrollbar-thumb { background: rgba(10,14,26,0.2); border-radius: 5px; }
      #root { width: 100%; }
      :root { --pad-v: 60px; --pad-h: 64px; --pad-v-lg: 120px; }
      @media (max-width: 680px) {
        :root { --pad-v: 32px; --pad-h: 18px; --pad-v-lg: 40px; }
      }
    </style>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useRef } = React;
      const MobileCtx = React.createContext(false);
      const useIsMobile = () => React.useContext(MobileCtx);
      const LandscapeCtx = React.createContext(false);
      const useIsLandscape = () => React.useContext(LandscapeCtx);

      const C = { bg:"#F2EEE6", card:"#FFFFFF", ink:"#0A0E1A", ink2:"rgba(10,14,26,0.7)", ink3:"rgba(10,14,26,0.5)", rule:"rgba(10,14,26,0.12)", coral:"#1779DA", coralSoft:"#DCEEFF", gap:"#DC2626", blue:"#3F7BA4", green:"#2E7B4E", amber:"#B26B1E" };
      const sans  = '"Inter Tight", system-ui, sans-serif';
      const serif = '"Instrument Serif", "Times New Roman", serif';

      /* ── ORB ── */
      const OrbV2 = ({ containerRef, themeColor = "#1779DA" }) => {
        const orbRef = useRef(null); const rafRef = useRef(null);
        const targetRef = useRef({ x:0.5, y:0.5 }); const currentRef = useRef({ x:0.5, y:0.4 }); const tRef = useRef(0);
        useEffect(() => {
          const el = orbRef.current; if (!el) return;
          const container = containerRef?.current || el.parentElement;
          const onMove = (e) => { if (!container) return; const r = container.getBoundingClientRect(); targetRef.current = { x:Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)), y:Math.max(0,Math.min(1,(e.clientY-r.top)/r.height)) }; };
          const tick = () => { tRef.current+=0.005; const t=tRef.current; const dx=0.5+Math.sin(t*0.6)*0.18; const dy=0.4+Math.cos(t*0.5)*0.14; const b=0.4; const tx=dx*(1-b)+targetRef.current.x*b; const ty=dy*(1-b)+targetRef.current.y*b; const e=0.05; currentRef.current.x+=(tx-currentRef.current.x)*e; currentRef.current.y+=(ty-currentRef.current.y)*e; el.style.transform=`translate3d(${currentRef.current.x*100-50}%,${currentRef.current.y*100-50}%,0) rotate(${Math.sin(t*0.3)*12}deg)`; rafRef.current=requestAnimationFrame(tick); };
          if (container) container.addEventListener("mousemove",onMove);
          rafRef.current = requestAnimationFrame(tick);
          return () => { cancelAnimationFrame(rafRef.current); if (container) container.removeEventListener("mousemove",onMove); };
        }, [containerRef]);
        const gradient = `radial-gradient(circle at 30% 30%, #C7DBFF 0%, ${themeColor} 40%, #0D4A8A 70%, #0A1628 100%)`;
        return <div ref={orbRef} style={{ position:"absolute", left:"50%", top:"50%", width:600, height:600, marginLeft:-300, marginTop:-300, borderRadius:"50%", background:gradient, filter:"blur(40px) saturate(1.15)", opacity:0.38, pointerEvents:"none", willChange:"transform", mixBlendMode:"multiply" }} />;
      };

      /* ── CURSOR ── */
      const ColorCursor = ({ containerRef }) => {
        const [pos,setPos]=useState({x:-100,y:-100}); const [variant,setVariant]=useState("default"); const [visible,setVisible]=useState(false);
        useEffect(() => {
          const el = containerRef?.current; if (!el) return;
          const onMove = (e) => { const r=el.getBoundingClientRect(); setPos({x:e.clientX-r.left,y:e.clientY-r.top}); setVisible(true); let t=e.target,v="default"; while(t&&t!==el){if(t.dataset&&t.dataset.cursor){v=t.dataset.cursor;break;}t=t.parentElement;} setVariant(v); };
          const onLeave = () => setVisible(false);
          el.addEventListener("mousemove",onMove); el.addEventListener("mouseleave",onLeave);
          return () => { el.removeEventListener("mousemove",onMove); el.removeEventListener("mouseleave",onLeave); };
        },[containerRef]);
        const V = {default:{size:16,color:"#FF5C2A",label:null},footer:{size:60,color:"#FF5C2A",label:"✶"},link:{size:36,color:"#FF5C2A",label:null}};
        const v = V[variant]||V.default;
        return <div style={{ position:"absolute", left:pos.x, top:pos.y, width:v.size, height:v.size, marginLeft:-v.size/2, marginTop:-v.size/2, borderRadius:"50%", background:v.color, pointerEvents:"none", zIndex:100, transition:"width 0.25s,height 0.25s,margin 0.25s,opacity 0.2s", opacity:visible?1:0, display:"flex", alignItems:"center", justifyContent:"center", color:"#fff", fontFamily:sans, fontSize:11, fontWeight:600, letterSpacing:"0.14em", textTransform:"uppercase" }}>{v.label}</div>;
      };

      /* ── PASSWORD GATE ── */
      const PasswordGate = ({ children }) => {
        const [unlocked,setUnlocked]=useState(()=>localStorage.getItem('cs_auth')==='ok');
        const [val,setVal]=useState(''); const [err,setErr]=useState(false);
        if (unlocked) return children;
        const submit = (e) => { e.preventDefault(); if(val==='casestudies'){localStorage.setItem('cs_auth','ok');setUnlocked(true);}else{setErr(true);setVal('');} };
        return (
          <div style={{ minHeight:'100vh', background:'#F2EEE6', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', fontFamily:sans, cursor:'default' }}>
            <div style={{ marginBottom:12, fontSize:11, letterSpacing:'0.18em', textTransform:'uppercase', color:'rgba(10,14,26,0.45)' }}>Portfolio · Protected</div>
            <div style={{ fontSize:36, fontWeight:700, letterSpacing:'-0.03em', color:'#0A0E1A', marginBottom:10 }}>Enter password</div>
            <div style={{ fontSize:16, color:'rgba(10,14,26,0.55)', marginBottom:44 }}>This case study is password protected.</div>
            <form onSubmit={submit} style={{ display:'flex', flexDirection:'column', gap:12, width:320 }}>
              <input type="password" value={val} onChange={e=>{setVal(e.target.value);setErr(false);}} placeholder="Password" autoFocus
                style={{ padding:'14px 18px', borderRadius:12, border:`1.5px solid ${err?'#FF5C2A':'rgba(10,14,26,0.18)'}`, background:'#fff', fontSize:16, color:'#0A0E1A', outline:'none', fontFamily:sans }} />
              {err && <div style={{ fontSize:13, color:'#FF5C2A' }}>Incorrect password — try again.</div>}
              <button type="submit" style={{ padding:'14px', borderRadius:12, background:'#0A0E1A', color:'#F2EEE6', fontSize:13, fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase', border:'none', cursor:'pointer', fontFamily:sans }}>Unlock →</button>
            </form>
          </div>
        );
      };

      /* ── LIGHTBOX ── */
      const LightboxContext = React.createContext(null);
      const Lightbox = ({ children }) => {
        const [src, setSrc] = useState(null);
        return (
          <LightboxContext.Provider value={setSrc}>
            {children}
            {src && (
              <div onClick={()=>setSrc(null)} style={{ position:"fixed", inset:0, zIndex:999, background:"rgba(10,14,26,0.88)", display:"flex", alignItems:"center", justifyContent:"center", cursor:"zoom-out", backdropFilter:"blur(6px)" }}>
                <img src={src} onClick={e=>e.stopPropagation()} style={{ maxWidth:"92vw", maxHeight:"92vh", objectFit:"contain", borderRadius:12, boxShadow:"0 32px 80px rgba(0,0,0,0.5)", cursor:"default" }} />
                <button onClick={()=>setSrc(null)} style={{ position:"fixed", top:24, right:32, background:"rgba(255,255,255,0.12)", border:"none", color:"#fff", fontSize:28, width:44, height:44, borderRadius:"50%", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", lineHeight:1 }}>×</button>
              </div>
            )}
          </LightboxContext.Provider>
        );
      };
      const Img = ({ src, alt, style }) => {
        const open = React.useContext(LightboxContext);
        return <img src={src} alt={alt} onClick={()=>open&&open(src)} style={{ ...style, cursor:"zoom-in" }} />;
      };

      /* ── NAV ── */
      const navBtn = { appearance:"none", border:"none", background:"transparent", cursor:"pointer", fontFamily:sans, padding:0, margin:0 };
      const nav = (t) => { window.location.href = t==="home" ? "index.html" : `index.html#${t}`; };
      const Nav = () => {
        const isMobile = useIsMobile();
        const isLandscape = useIsLandscape();
        return (
          <div style={{ position: isLandscape ? "relative" : "sticky", top:0, zIndex:50, padding: isMobile ? "12px 16px" : "20px 48px", display:"flex", justifyContent:"space-between", alignItems:"center", background:"rgba(242,238,230,0.74)", backdropFilter:"blur(14px) saturate(1.4)", WebkitBackdropFilter:"blur(14px) saturate(1.4)", borderBottom:"1px solid rgba(10,14,26,0.08)" }}>
            <button type="button" onClick={()=>nav("home")} style={{ ...navBtn, display:"flex", alignItems:"center", color:C.ink }}>
              <div style={{ width:32, height:32, borderRadius:8, background:"#0A0E1A", color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, marginRight: isMobile ? 0 : 10, flexShrink:0 }}>◆</div>
              {!isMobile && <div style={{ textAlign:"left" }}>
                <div style={{ fontSize:13, fontWeight:700, letterSpacing:"0.04em", textTransform:"uppercase" }}>Christina Doolan</div>
                <div style={{ fontSize:10, letterSpacing:"0.14em", textTransform:"uppercase", color:"rgba(10,14,26,0.5)", fontWeight:500 }}>UX/UI Designer</div>
              </div>}
            </button>
            <div style={{ display:"flex", gap: isMobile ? 2 : 6, alignItems:"center" }}>
              {[["home","Home"],["portfolio","Portfolio"],["resume","Resume"]].map(([id,label])=>(
                <button key={id} type="button" onClick={()=>nav(id)} style={{ ...navBtn, padding: isMobile ? "6px 8px" : "8px 14px", fontSize: isMobile ? 11 : 12, letterSpacing:"0.12em", textTransform:"uppercase", color:"rgba(10,14,26,0.5)", fontWeight:500 }}>{label}</button>
              ))}
            </div>
          </div>
        );
      };

      /* ── SHARED PRIMITIVES ── */
      const Label = ({ children, color=C.coral }) => <div style={{ fontFamily:sans, fontSize:11, letterSpacing:"0.18em", textTransform:"uppercase", color, fontWeight:600, marginBottom:14 }}>{children}</div>;
      const STitle = ({ children, size=56 }) => <h2 style={{ fontFamily:sans, fontWeight:600, fontSize:size, lineHeight:1.02, letterSpacing:"-0.03em", color:C.ink, margin:0 }}>{children}</h2>;
      const I = ({ children }) => <span style={{ fontFamily:serif, fontStyle:"italic", fontWeight:400 }}>{children}</span>;
      const Body = ({ children, size=17, color=C.ink2 }) => <p style={{ fontFamily:sans, fontSize:size, lineHeight:1.6, color, margin:"0 0 16px", textWrap:"pretty" }}>{children}</p>;
      const Rule = () => <div style={{ height:1, background:C.rule }} />;
      const TwoCol = ({ left, right }) => {
        const isMobile = useIsMobile();
        return <div style={{ display:"grid", gridTemplateColumns: isMobile ? "1fr" : "35fr 60fr", gap: isMobile ? 28 : 80 }}><div>{left}</div><div>{right}</div></div>;
      };
      const Phone = ({ children, tall=true, style={} }) => (
        <div style={{ borderRadius:32, border:`2px solid ${C.ink}`, background:"#EDE7DC", aspectRatio:tall?"9/19.5":"9/18", position:"relative", overflow:"hidden", ...style }}>
          <div style={{ position:"absolute", top:8, left:"50%", transform:"translateX(-50%)", width:90, height:22, borderRadius:999, background:C.ink }} />
          <div style={{ position:"absolute", top:14, left:18, fontFamily:sans, fontSize:11, color:C.ink, fontWeight:600 }}>9:41</div>
          {children}
        </div>
      );
      const Card = ({ children, style={} }) => <div style={{ background:C.card, borderRadius:18, padding:32, boxShadow:"0 2px 12px rgba(0,0,0,0.06)", boxSizing:"border-box", width:"100%", minWidth:0, ...style }}>{children}</div>;

      /* ── HERO ── */
      const Hero = ({ containerRef }) => {
        const isMobile = useIsMobile();
        const cards = [
          { lab:"The RFP", items:["Operations & workflow","Billing & contracts","Reporting & dashboards","Mobile & compliance"], bg:"rgba(255,255,255,0.7)", color:C.ink2, note:"dozens of requirements" },
          { lab:"Our evaluation", items:["What already exists","What's partially supported","What's a true gap","What's feasible to commit"], bg:"rgba(255,255,255,0.85)", color:C.ink, note:"capability mapping" },
          { lab:"Commited features", items:["Billing","KPI Tracking","OTP Dashboard","Compliance dashboard"], bg:C.coralSoft, color:C.ink, note:"what we'll deliver" },
        ];
        return (
          <section style={{ position:"relative", padding: isMobile ? "40px 18px 60px" : "60px 64px 120px", minHeight: isMobile ? "auto" : 940, overflow:"hidden" }}>
            <div style={{ position:"absolute", inset:0, pointerEvents:"none" }}><OrbV2 containerRef={containerRef} themeColor="#1779DA" /></div>
            <div style={{ position:"relative", zIndex:2, textAlign:"center", paddingTop: isMobile ? 40 : 80 }}>
              <span style={{ display:"inline-block", padding:"8px 18px", border:`1px solid ${C.ink}`, borderRadius:999, fontFamily:sans, fontSize:11, letterSpacing:"0.18em", textTransform:"uppercase", color:C.ink, marginBottom:36 }}>Stakeholder Pipeline · Product Definition</span>
              <h1 style={{ fontFamily:sans, fontWeight:700, fontSize:"clamp(36px,6.2vw,90px)", lineHeight:0.98, letterSpacing:"-0.04em", color:C.ink, maxWidth:1140, margin:"0 auto", textWrap:"balance" }}>
                Turning client requests into <I>shipped products.</I>
              </h1>
            </div>
            {isMobile ? (
              <div style={{ position:"relative", zIndex:2, display:"flex", flexDirection:"column", gap:12, maxWidth:1140, margin:"40px auto 0" }}>
                {cards.map((c,i) => (
                  <div key={i} style={{ background:c.bg, border:`1px solid ${C.rule}`, borderRadius:14, padding:18, backdropFilter:"blur(6px)" }}>
                    <Label color={C.coral}>{c.lab}</Label>
                    <ul style={{ margin:"0 0 8px", paddingLeft:16, fontFamily:sans, fontSize:13, color:c.color, lineHeight:1.6 }}>{c.items.map(it=><li key={it}>{it}</li>)}</ul>
                    <div style={{ fontFamily:serif, fontStyle:"italic", fontSize:13, color:C.ink3 }}>{c.note}</div>
                  </div>
                ))}
              </div>
            ) : (
              <div style={{ position:"relative", zIndex:2, display:"grid", gridTemplateColumns:"1fr auto 1fr auto 1fr", gap:18, alignItems:"stretch", maxWidth:1140, margin:"80px auto 0" }}>
                {[cards[0], null, cards[1], null, cards[2]].map((c,i)=>c==null
                  ? <div key={i} style={{ display:"flex", alignItems:"center", fontFamily:serif, fontStyle:"italic", fontSize:28, color:C.coral }}>→</div>
                  : <div key={i} style={{ background:c.bg, border:`1px solid ${C.rule}`, borderRadius:14, padding:22, backdropFilter:"blur(6px)", display:"flex", flexDirection:"column" }}>
                      <Label color={C.coral}>{c.lab}</Label>
                      <ul style={{ margin:"0 0 14px", paddingLeft:16, fontFamily:sans, fontSize:13, color:c.color, lineHeight:1.7, flex:1 }}>{c.items.map(it=><li key={it}>{it}</li>)}</ul>
                      <div style={{ fontFamily:serif, fontStyle:"italic", fontSize:14, color:C.ink3 }}>{c.note}</div>
                    </div>
                )}
              </div>
            )}
          </section>
        );
      };

      /* ── 01 OVERVIEW ── */
      const Overview = () => {
        const isMobile = useIsMobile();
        return (
        <section style={{ padding:"var(--pad-v-lg) var(--pad-h)", maxWidth:1280, margin:"0 auto" }}>
          <TwoCol
            left={<><STitle>The product<I> definition</I> problem</STitle></>}
            right={<>
              <Body size={19}>The client didn't have a feature request. They had a 29 page RFP spanning billing, contracts, reporting, mobile workflows, dashboards, and operational tooling. While many requirements already existed in HALO, others represented significant gaps—and not everything could be built at once.</Body>
              <Body size={19}>The challenge wasn't just about designing a feature. It was determining which requirements would deliver the most value, fit within technical constraints, and could realistically be committed to within the project timeline. Before a single screen could be designed, we needed a clear plan for what to build, what to defer, and why.</Body>
            </>}
          />
          <div style={{ height: isMobile ? 40 : 80 }} /><Rule />
          <div style={{ display:"grid", gridTemplateColumns: isMobile ? "1fr 1fr" : "repeat(3,1fr)", gap: isMobile ? 24 : 40, padding:"40px 0", maxWidth: isMobile ? "100%" : 900, margin:"0 auto" }}>
            {[["Role","Lead Product Designer"],["Work","RFP eval · Feature development"],["Cadence","Weekly sessions + onsite"]].map(([k,v])=>(
              <div key={k}><Label>{k}</Label><div style={{ fontFamily:sans, fontSize:18, color:C.ink, fontWeight:500 }}>{v}</div></div>
            ))}
          </div>
          <Rule />
        </section>
        );
      };

      /* ── 03 RFP REVIEW ── */
      const RFPReview = () => {
        const rows=[
          ["Flight & Task Management",        88,  7,  5],
          ["Contracts & Service Config",       78, 12, 10],
          ["Mobile App Functionality",         78, 12, 10],
          ["Initial Configuration Mgmt",       78, 12, 10],
          ["Security, Access & Compliance",    72, 15, 13],
          ["Workforce Management",             55, 20, 25],
          ["Dashboard & Reporting",            45, 25, 30],
          ["AI & Communication",               10, 10, 80],
          ["Billing & Invoicing",               5, 10, 85],
          ["Flight Classification & Billing",   0,  0,100],
          ["Billing Flexibility & Config",      0,  0,100],
        ];
        return (
          <section style={{ padding:"var(--pad-v) var(--pad-h) var(--pad-v-lg)", maxWidth:1280, margin:"0 auto" }}>
            <TwoCol
              left={<>
                <Label>01 · Reviewing the RFP</Label>
                <STitle size={46}>Mapping every ask to what we <I>already had</I></STitle>
                <div style={{ marginTop:20 }}>
                  <Body>We went through the RFP line by line and scored each requirement against the live platform: fully supported, partially supported, or a true gap. This turned an intimidating document into a decision-making instrument.</Body>
                  <Body>The pattern emerged fast. Operational features were largely covered. As you moved toward billing and contracts, the platform fell away almost entirely.</Body>
                </div>
                <div style={{ display:"flex", gap:20, marginTop:24 }}>
                  {[["Exists",C.green],["Partial",C.amber],["Gap",C.gap]].map(([l,c])=>(
                    <div key={l} style={{ display:"flex", alignItems:"center", gap:8 }}>
                      <span style={{ width:12, height:12, borderRadius:3, background:c }} />
                      <span style={{ fontFamily:sans, fontSize:13, color:C.ink2 }}>{l}</span>
                    </div>
                  ))}
                </div>
              </>}
              right={
                <Card style={{ padding:36 }}>
                  {rows.map(([name,ex,pa,ga],i)=>(
                    <div key={name} style={{ marginBottom:i===rows.length-1?0:22 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                        <span style={{ fontFamily:sans, fontSize:14, fontWeight:600, color:C.ink }}>{name}</span>
                        <span style={{ fontFamily:sans, fontSize:12, color:ga>=50?C.gap:C.ink3, fontWeight:ga>=50?700:500 }}>{ga>=50?"Major gap":ga>=25?"Partial gap":"Covered"}</span>
                      </div>
                      <div style={{ display:"flex", height:12, borderRadius:6, overflow:"hidden", background:C.rule }}>
                        <div style={{ width:`${ex}%`, background:C.green }} /><div style={{ width:`${pa}%`, background:C.amber }} /><div style={{ width:`${ga}%`, background:C.gap }} />
                      </div>
                    </div>
                  ))}
                </Card>
              }
            />
          </section>
        );
      };

      /* ── 06 WORKING WITH WFS ── */
      const WorkingWith = () => (
        <section style={{ padding:"var(--pad-v) var(--pad-h) var(--pad-v-lg)", maxWidth:1280, margin:"0 auto" }}>
          <TwoCol
            left={<>
              <Label>03 · Working with the Client</Label>
              <STitle size={46}>Every commitment required a <I>conversation</I></STitle>
              <div style={{ marginTop:20 }}>
                <Body size={18}>Once billing surfaced as the priority, the work became deeply collaborative. We established weekly working sessions with the client to understand their real billing workflows, approval structures, reporting needs, and contract rules — then traveled onsite to align on scope and lock commitments face to face.</Body>
              </div>
            </>}
            right={
              <Card style={{ padding:36 }}>
                <Label>Engagement cadence</Label>
                <div style={{ marginTop:12 }}>
                  {[["Weekly working sessions","Walk current workflows, review proposed flows, gather feedback"],["Product reviews","Demo iterations against real billing scenarios"],["Onsite alignment","Travel to the client to pressure-test scope and priorities in person"],["Commitment sign-off","Convert agreed scope into the committed roadmap"]].map(([t,d],i)=>(
                    <div key={t} style={{ display:"grid", gridTemplateColumns:"auto 1fr", gap:18, paddingBottom:i===3?0:22 }}>
                      <div style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
                        <div style={{ width:30, height:30, borderRadius:"50%", background:i===3?C.coral:C.coralSoft, color:i===3?"#fff":C.coral, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:sans, fontWeight:700, fontSize:13 }}>{i+1}</div>
                        {i<3&&<div style={{ width:2, flex:1, background:C.rule, marginTop:4 }} />}
                      </div>
                      <div>
                        <div style={{ fontFamily:sans, fontSize:15.5, fontWeight:600, color:C.ink, marginBottom:4 }}>{t}</div>
                        <div style={{ fontFamily:sans, fontSize:13.5, color:C.ink2, lineHeight:1.5 }}>{d}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </Card>
            }
          />
        </section>
      );

      /* ── 07 ROADMAP ── */
      const Roadmap = () => {
        const isMobile = useIsMobile();
        const tiers=[{tier:"Priority 1",note:"Commit & build first",color:C.coral,items:["Billing","Multi-Airport Support","Events as KPIs","Turnaround Progress Tracking","Delay Coding"]},{tier:"Priority 2",note:"Fast-follow once P1 lands",color:C.blue,items:["KPI Performance Metrics", "complience dashboard"]}];
        return (
          <section style={{ padding:"var(--pad-v) var(--pad-h) var(--pad-v-lg)", maxWidth:1280, margin:"0 auto" }}>
            <Label>02 · Defining the roadmap</Label>
            <STitle size={48}>What we <I>committed</I> to</STitle>
            <div style={{ maxWidth:760, marginTop:16, marginBottom:56 }}>
