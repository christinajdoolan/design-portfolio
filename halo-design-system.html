<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Christina Doolan — HALO Cross-Platform Design System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { scroll-behavior: smooth; }
      html, body {
        background: #F2EEE6;
        font-family: "Inter Tight", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      a { color: inherit; text-decoration: none; }
      ::-webkit-scrollbar { width: 10px; }
      ::-webkit-scrollbar-track { background: #E8E2D4; }
      ::-webkit-scrollbar-thumb { background: rgba(10,14,26,0.2); border-radius: 5px; }
      #root { width: 100%; }
      :root { --pad-v: 60px; --pad-h: 64px; --pad-v-lg: 120px; }
      @media (max-width: 680px) {
        :root { --pad-v: 32px; --pad-h: 18px; --pad-v-lg: 40px; }
      }
    </style>

    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef, Fragment } = React;
      const MobileCtx = React.createContext(false);
      const useIsMobile = () => React.useContext(MobileCtx);
      const LandscapeCtx = React.createContext(false);
      const useIsLandscape = () => React.useContext(LandscapeCtx);

      /* ─── DESIGN TOKENS ──────────────────────────────────────────────── */
      const C = {
        bg:        "#F2EEE6",
        card:      "#FFFFFF",
        ink:       "#0A0E1A",
        ink2:      "rgba(10,14,26,0.7)",
        ink3:      "rgba(10,14,26,0.5)",
        rule:      "rgba(10,14,26,0.12)",
        coral:     "#1779DA",
        coralSoft: "#DCEEFF",
        slateE:    "#181D29",
        slateD:    "#1F283A",
        slateC:    "#2B3851",
        grey100:   "#FAFAFA",
        grey300:   "#E4E9EE",
        grey500:   "#C7D0D7",
      };
      const sans  = '"Inter Tight", system-ui, sans-serif';
      const serif = '"Instrument Serif", "Times New Roman", serif';
      const mono  = '"JetBrains Mono", ui-monospace, monospace';

      /* ─── ORB V2 ─────────────────────────────────────────────────────── */
      const OrbV2 = ({ containerRef, themeColor = "#1779DA", scrollProgress = 0 }) => {
        const orbRef     = useRef(null);
        const rafRef     = useRef(null);
        const targetRef  = useRef({ x: 0.5, y: 0.5 });
        const currentRef = useRef({ x: 0.5, y: 0.4 });
        const tRef       = useRef(0);

        useEffect(() => {
          const el = orbRef.current;
          if (!el) return;
          const container = containerRef?.current || el.parentElement;
          const onMove = (e) => {
            if (!container) return;
            const r = container.getBoundingClientRect();
            targetRef.current = {
              x: Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)),
              y: Math.max(0, Math.min(1, (e.clientY - r.top)  / r.height)),
            };
          };
          const tick = () => {
            tRef.current += 0.005;
            const t   = tRef.current;
            const driftX = 0.5 + Math.sin(t * 0.6) * 0.18;
            const driftY = 0.4 + Math.cos(t * 0.5) * 0.14;
            const blend  = 0.4;
            const tx = driftX * (1 - blend) + targetRef.current.x * blend;
            const ty = driftY * (1 - blend) + targetRef.current.y * blend;
            const ease = 0.05;
            currentRef.current.x += (tx - currentRef.current.x) * ease;
            currentRef.current.y += (ty - currentRef.current.y) * ease;
            const cx = currentRef.current.x * 100;
            const cy = currentRef.current.y * 100;
            el.style.transform = `translate3d(${cx - 50}%, ${cy - 50}%, 0) rotate(${Math.sin(t * 0.3) * 12}deg)`;
            rafRef.current = requestAnimationFrame(tick);
          };
          if (container) container.addEventListener("mousemove", onMove);
          rafRef.current = requestAnimationFrame(tick);
          return () => {
            cancelAnimationFrame(rafRef.current);
            if (container) container.removeEventListener("mousemove", onMove);
          };
        }, [containerRef]);

        const gradient = `radial-gradient(circle at 30% 30%, #C7DBFF 0%, ${themeColor} 40%, #0D4A8A 70%, #0A1628 100%)`;
        const size = 600 + scrollProgress * 200;
        return (
          <div ref={orbRef} style={{ position: "absolute", left: "50%", top: "50%", width: size, height: size, marginLeft: -size / 2, marginTop: -size / 2, borderRadius: "50%", background: gradient, filter: "blur(40px) saturate(1.15)", opacity: 0.63, pointerEvents: "none", willChange: "transform, background", mixBlendMode: "multiply", transition: "background 1.2s ease, width 1s ease, height 1s ease, margin 1s ease" }} />
        );
      };

      /* ─── COLOR CURSOR ───────────────────────────────────────────────── */
      const ColorCursor = ({ containerRef }) => {
        const [pos,     setPos]     = useState({ x: -200, y: -200 });
        const [variant, setVariant] = useState("default");
        const [visible, setVisible] = useState(false);

        useEffect(() => {
          const el = containerRef?.current;
          if (!el) return;
          const onMove = (e) => {
            const r = el.getBoundingClientRect();
            setPos({ x: e.clientX - r.left, y: e.clientY - r.top });
            setVisible(true);
            let t = e.target; let v = "default";
            while (t && t !== el) {
              if (t.dataset?.cursor) { v = t.dataset.cursor; break; }
              t = t.parentElement;
            }
            setVariant(v);
          };
          const onLeave = () => setVisible(false);
          el.addEventListener("mousemove", onMove);
          el.addEventListener("mouseleave", onLeave);
          return () => { el.removeEventListener("mousemove", onMove); el.removeEventListener("mouseleave", onLeave); };
        }, [containerRef]);

        const variants = {
          default: { size: 16, color: C.coral,    blend: "normal",    label: null },
          footer:  { size: 60, color: C.coral,    blend: "normal",    label: "✶" },
          link:    { size: 36, color: C.coral,    blend: "normal",    label: null },
        };
        const v = variants[variant] || variants.default;
        return (
          <div style={{ position: "fixed", left: pos.x, top: pos.y, width: v.size, height: v.size, marginLeft: -v.size / 2, marginTop: -v.size / 2, borderRadius: "50%", background: v.color, mixBlendMode: v.blend, pointerEvents: "none", zIndex: 9999, transition: "width .25s cubic-bezier(.2,.9,.2,1), height .25s cubic-bezier(.2,.9,.2,1), margin .25s cubic-bezier(.2,.9,.2,1), background .25s, opacity .2s", opacity: visible ? 1 : 0, display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontFamily: sans, fontSize: 11, fontWeight: 600, letterSpacing: "0.14em", textTransform: "uppercase" }}>
            {v.label}
          </div>
        );
      };

      /* ─── PRIMITIVES ─────────────────────────────────────────────────── */
      const I = ({ children }) => <span style={{ fontFamily: serif, fontStyle: "italic", fontWeight: 400 }}>{children}</span>;

      const Label = ({ children, color = C.coral }) => (
        <div style={{ fontFamily: sans, fontSize: 11, letterSpacing: "0.18em", textTransform: "uppercase", color, fontWeight: 600, marginBottom: 14 }}>{children}</div>
      );

      const STitle = ({ children, size = 56 }) => (
        <h2 style={{ fontFamily: sans, fontWeight: 600, fontSize: size, lineHeight: 1.02, letterSpacing: "-0.03em", color: C.ink, margin: 0 }}>{children}</h2>
      );

      const Body = ({ children, size = 17, color = C.ink2 }) => (
        <p style={{ fontFamily: sans, fontSize: size, lineHeight: 1.6, color, margin: "0 0 16px" }}>{children}</p>
      );

      const Rule = () => <div style={{ height: 1, background: C.rule }} />;

      const TwoCol = ({ left, right }) => {
        const isMobile = useIsMobile();
        return (
          <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "35fr 60fr", gap: isMobile ? 28 : 80 }}>
            <div>{left}</div>
            <div>{right}</div>
          </div>
        );
      };

      /* ─── TOKEN DATA ─────────────────────────────────────────────────── */
      const BRAND_SCALES = [
        { name: "Red",    note: "Critical, alert, error",  stops: [["100","#FDEBEC"],["200","#F8C9CE"],["300","#F09AA2"],["400","#E56A77"],["500","#CC3E52"],["600","#A82F41"],["700","#7C2330"],["800","#561822"],["900","#2E0E15"]] },
        { name: "Yellow", note: "Warning, caution",        stops: [["100","#FFFBEA"],["200","#FFF3C4"],["300","#FFE58F"],["400","#FACC55"],["500","#E0AE0F"],["600","#B98C0A"],["700","#946D08"],["800","#5E4B02"],["900","#2A2404"]] },
        { name: "Green",  note: "Positive, success",       stops: [["100","#E6F4EF"],["200","#C1E4D6"],["300","#97D1BC"],["400","#6ABF9F"],["500","#46AD85"],["600","#358A6B"],["700","#296C56"],["800","#205141"],["900","#173C32"]] },
        { name: "Blue",   note: "Info, link, system",      stops: [["100","#E6F2FC"],["200","#BFDFF9"],["300","#8AC3F2"],["400","#4DA4EB"],["500","#1779DA"],["600","#1469C0"],["700","#17579E"],["800","#1C467C"],["900","#1A345C"]] },
      ];

      const BRAND_NEUTRALS = [
        { name: "HALO-Grey",  note: "Content & surfaces",         stops: [["100","#FAFAFA"],["200","#E9EDF1"],["300","#E4E9EE"],["400","#DCE1E6"],["500","#C7D0D7"],["600","#B4BEC8"],["700","#808991"],["800","#475161"],["900","#2A3140"]] },
        { name: "HALO-Slate", note: "Content & surfaces", stops: [["A","#3A4258"],["B","#2E3748"],["C","#2B3851"],["D","#1F283A"],["E","#181D29"],["F","#141620"],["G","#0F1017"],["H","#07080B"]] },
      ];

      const SEMANTIC_GROUPS = [
        { name: "Surface", count: 20, rows: [
          ["primary",               "HALO-Slate/D", "#1F283A",  "HALO-Grey/100",  "#FAFAFA"],
          ["secondary",             "HALO-Slate/C", "#2B3851",  "HALO-Grey/300",  "#E4E9EE"],
          ["tertiary",              "HALO-Slate/B", "#2E3748",  "HALO-Grey/200",  "#E9EDF1"],
          ["invert-static",         "HALO-Grey/400","#DCE1E6",  "HALO-Grey/400",  "#DCE1E6"],
          ["bottom-sheet-primary",  "HALO-Slate/E", "#181D29",  "HALO-Grey/500",  "#C7D0D7"],
          ["nav-bar",               "HALO-Slate/E", "#181D29",  "HALO-Slate/E",   "#181D29"],
          ["critical",              "Red/800",       "#561822",  "Red/300",        "#F09AA2"],
          ["warning",               "Yellow/800",    "#5E4B02",  "Yellow/200",     "#FFF3C4"],
          ["positive",              "Green/800",     "#205141",  "Green/200",      "#C1E4D6"],
          ["info",                  "Blue/800",      "#1C467C",  "Blue/300",       "#8AC3F2"],
          ["chat",                  "HALO-Slate/C",  "#2B3851",  "HALO-Slate/C",   "#2B3851"],
        ]},
        { name: "Content", count: 21, rows: [
          ["primary",    "HALO-Grey/100", "#FAFAFA",  "HALO-Slate/E", "#181D29"],
          ["secondary",  "HALO-Grey/500", "#C7D0D7",  "HALO-Slate/D", "#1F283A"],
          ["tertiary",   "HALO-Grey/700", "#808991",  "HALO-Slate/C", "#2B3851"],
          ["invert",     "HALO-Slate/E",  "#181D29",  "HALO-Grey/100","#FAFAFA"],
          ["on-critical","HALO-Grey/100", "#FAFAFA",  "HALO-Grey/100","#FAFAFA"],
          ["on-warning", "HALO-Slate/E",  "#181D29",  "HALO-Slate/E", "#181D29"],
          ["link",       "Blue/300",      "#8AC3F2",  "Blue/700",     "#17579E"],
        ]},
        { name: "Border", count: 6, rows: [
          ["default",  "HALO-Slate/B","#2E3748", "HALO-Grey/400","#DCE1E6"],
          ["strong",   "HALO-Slate/A","#3A4258", "HALO-Grey/500","#C7D0D7"],
          ["critical", "Red/600",     "#A82F41", "Red/500",      "#CC3E52"],
          ["focus",    "Blue/400",    "#4DA4EB", "Blue/500",     "#1779DA"],
        ]},
      ];

      const SPACE_ROWS_SPACE = [
        ["100","micro",2], ["300","inline",8],
        ["400","sub-group",12], ["500","group",16],
        ["600","related",24], ["800","section",40],
      ];
      const SPACE_ROWS_PADDING = [
        ["100","micro",2], ["200","",4],
        ["300","tight",8], ["400","",12],
        ["500","",16], ["600","",24],
      ];
      const SPACE_PLATFORMS = {
        phone: [
          { group: "space", rows: SPACE_ROWS_SPACE },
          { group: "screen-padding", rows: [
            ["page","",16], ["side-sheet","",24],
            ["safe-area","",40], ["btn-text","",49],
            ["bottom-btn","",80],
          ]},
          { group: "padding", rows: SPACE_ROWS_PADDING },
        ],
        ipad: [
          { group: "space", rows: SPACE_ROWS_SPACE },
          { group: "screen-padding", rows: [
            ["page","",20], ["side-sheet","",24],
            ["safe-area","",40], ["btn-text","",49],
            ["bottom-btn","",32],
          ]},
          { group: "padding", rows: SPACE_ROWS_PADDING },
        ],
        web: [
          { group: "space", rows: [
            ["100","micro",2], ["300","inline",4],
            ["400","sub-group",8], ["500","group",12],
            ["600","related",16], ["800","section",40],
          ]},
          { group: "screen-padding", rows: [
            ["page","",16], ["side-sheet","",24],
            ["safe-area","",40], ["btn-text","",49],
            ["bottom-btn","",32],
          ]},
          { group: "padding", rows: SPACE_ROWS_PADDING },
        ],
      };

      const TYPE_FONT_FAMILY = [["Regular","Inter"],["Small","Inter"],["Large","Inter"]];

      const TYPE_SCALE = [
        ["400", 12,10,14, 20,16,24],
        ["500", 14,12,16, 22,16,24],
        ["600", 16,14,18, 24,20,28],
        ["700", 18,16,20, 28,24,31],
        ["900", 20,18,22, 32,28,32],
      ];

      const TYPE_WEIGHTS = [
        ["100",100,"Thin"],["200",200,"ExtraLight"],["300",300,"Light"],
        ["400",400,"Regular"],["500",500,"Medium"],["600",600,"SemiBold"],
        ["700",700,"Bold"],["800",800,"ExtraBold"],["900",900,"Black"],
      ];

      /* ─── STICKY NAV ─────────────────────────────────────────────────── */
      const NAV_TABS = [["home","Home"],["portfolio","Portfolio"],["resume","Resume"]];
      const navResetBtn = { appearance:"none", border:"none", background:"transparent", cursor:"pointer", fontFamily:'"Inter Tight", system-ui, sans-serif', padding:0, margin:0 };
      const GlobalNav = ({ active, onNavigate, accent = "#FF5C2A" }) => {
        const isMobile = useIsMobile();
        return (
          <div style={{ position:"sticky", top:0, zIndex:50, padding: isMobile ? "12px 16px" : "20px 48px", display:"flex", justifyContent:"space-between", alignItems:"center", background:"rgba(242,238,230,0.74)", backdropFilter:"blur(14px) saturate(1.4)", WebkitBackdropFilter:"blur(14px) saturate(1.4)", borderBottom:"1px solid rgba(10,14,26,0.08)" }}>
            <button type="button" onClick={() => onNavigate && onNavigate("home")} style={{ ...navResetBtn, display:"flex", alignItems:"center", color:"#0A0E1A" }}>
              <div style={{ width:32, height:32, borderRadius:8, background:"#0A0E1A", color:"#fff", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, marginRight: isMobile ? 0 : 10, flexShrink:0 }}>◆</div>
              {!isMobile && <div style={{ textAlign:"left" }}>
                <div style={{ fontSize:13, fontWeight:700, letterSpacing:"0.04em", textTransform:"uppercase" }}>Christina Doolan</div>
                <div style={{ fontSize:10, letterSpacing:"0.14em", textTransform:"uppercase", color:"rgba(10,14,26,0.5)", fontWeight:500 }}>UX/UI Designer</div>
              </div>}
            </button>
            <div style={{ display:"flex", gap: isMobile ? 2 : 6, alignItems:"center" }}>
              {NAV_TABS.map(([id, label]) => {
                const isActive = active === id;
                return (
                  <button key={id} type="button" onClick={() => onNavigate && onNavigate(id)} style={{ ...navResetBtn, position:"relative", display:"inline-flex", alignItems:"center", whiteSpace:"nowrap", padding: isMobile ? "6px 8px" : "8px 14px", fontSize: isMobile ? 11 : 12, letterSpacing:"0.12em", textTransform:"uppercase", color: isActive ? "#0A0E1A" : "rgba(10,14,26,0.5)", fontWeight: isActive ? 600 : 500, transition:"color 0.25s ease" }}>
                    {isActive && <span style={{ display:"inline-block", width:6, height:6, borderRadius:"50%", background:accent, marginRight:9, flexShrink:0 }} />}
                    {label}
                  </button>
                );
              })}
            </div>
          </div>
        );
      };

      /* ─── HERO ───────────────────────────────────────────────────────── */
      const Hero = ({ containerRef }) => {
        const isMobile = useIsMobile();
        return (
        <section style={{ position: "relative", padding: isMobile ? "40px 18px 60px" : "60px 64px 100px", minHeight: isMobile ? "auto" : 920, overflow: "hidden" }}>
          <div style={{ position: "absolute", inset: 0, pointerEvents: "none" }}>
            <OrbV2 containerRef={containerRef} themeColor="#1779DA" scrollProgress={0} />
          </div>
          <div style={{ position: "relative", zIndex: 2, textAlign: "center", paddingTop: isMobile ? 40 : 80 }}>
            <span style={{ display: "inline-block", padding: "8px 18px", border: `1px solid ${C.ink}`, borderRadius: 999, fontFamily: sans, fontSize: 11, letterSpacing: "0.18em", textTransform: "uppercase", color: C.ink, marginBottom: 36 }}>
              Tokens · Components · Cross-platform
            </span>
            <h1 style={{ fontFamily: sans, fontWeight: 700, fontSize: "clamp(36px, 6.4vw, 92px)", lineHeight: 0.98, letterSpacing: "-0.04em", color: C.ink, maxWidth: 1100, margin: "0 auto 20px", textWrap: "balance" }}>
              One system. <I>Three</I> platforms. <I>Three</I> languages. <I>Two</I> color modes.
            </h1>
          </div>

          {/* Floating token cards */}
          <div style={{ position: "relative", zIndex: 2, marginTop: isMobile ? 40 : 100, height: isMobile ? "auto" : 320, display: "flex", justifyContent: "center", gap: 14, alignItems: "center", flexWrap: "wrap" }}>
            {[
              { tier: "Brand",    name: "Red/800",          val: "#561822",              swatch: "#561822",   rot: -6 },
              { tier: "Semantic", name: "surface.critical",  val: "→ Red/800 · dark",     swatch: "#561822",   rot:  3 },
              { tier: "Semantic", name: "surface.primary",   val: "→ HALO-Slate/D",       swatch: C.slateD,    rot: -2 },
              { tier: "Brand",    name: "HALO-Grey/100",     val: "#FAFAFA",              swatch: C.grey100,   rot:  5 },
              { tier: "Semantic", name: "content.primary",   val: "→ HALO-Slate/E · light",swatch: C.slateE,   rot: -4 },
              { tier: "Brand",    name: "Green/800",         val: "#205141",              swatch: "#205141",   rot:  2 },
            ].map((t, i) => (
              <div key={i} style={{ background: "#fff", borderRadius: 14, padding: 18, width: 248, boxShadow: "0 6px 22px rgba(10,14,26,0.08)", transform: `rotate(${t.rot}deg)`, border: `1px solid ${C.rule}` }}>
                <div style={{ fontFamily: sans, fontSize: 9, letterSpacing: "0.18em", textTransform: "uppercase", color: t.tier === "Brand" ? C.coral : "#3F7BA4", fontWeight: 700, marginBottom: 8 }}>{t.tier} token</div>
                <div style={{ fontFamily: mono, fontSize: 12, color: C.ink, fontWeight: 600, marginBottom: 10 }}>{t.name}</div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ width: 22, height: 22, borderRadius: 6, background: t.swatch, border: `1px solid ${C.rule}` }} />
                  <div style={{ fontFamily: mono, fontSize: 11, color: C.ink2 }}>{t.val}</div>
                </div>
              </div>
            ))}
          </div>
        </section>
        );
      };

      /* ─── OVERVIEW ───────────────────────────────────────────────────── */
      const Overview = () => {
        const isMobile = useIsMobile();
        return (
          <section style={{ padding: "var(--pad-v-lg) var(--pad-h)", maxWidth: 1280, margin: "0 auto" }}>
            <TwoCol
              left={<STitle>The systems <I>problem</I></STitle>}
              right={<>
                <Body size={19}>Moonwave shipped on iOS, Android, and web — and three different teams were quietly maintaining three different versions of every component, color, and font. Style drifted across platforms with no parity. Every translation broke a layout somewhere. Light mode was a wishlist item that kept getting backlogged.</Body>
                <Body size={19}>I architected a two-layer semantic token system to absorb all of it: brand tokens at the bottom, semantic tokens above, and components downstream of both. Every platform pulled from the same source of truth. Light mode shipped without a fork. And translation stopped being a liability.</Body>
              </>}
            />
            <div style={{ height: isMobile ? 40 : 80 }} />
            <Rule />
            <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr 1fr" : "repeat(4, 1fr)", gap: isMobile ? 24 : 40, padding: "40px 0" }}>
              {[["Tokens","500+"],["Components","100+"],["Layers","2"],["Adopted by","10 engineers"]].map(([k, v]) => (
                <div key={k}>
                  <Label>{k}</Label>
                  <div style={{ fontFamily: sans, fontSize: 28, color: C.ink, fontWeight: 600, letterSpacing: "-0.02em" }}>{v}</div>
                </div>
              ))}
            </div>
            <Rule />
          </section>
        );
      };

      /* ─── ARCHITECTURE ───────────────────────────────────────────────── */
      const Architecture = () => {
        const isMobile = useIsMobile();
        return (
        <section style={{ padding: "var(--pad-v) var(--pad-h)", maxWidth: 1280, margin: "0 auto" }}>
          <div style={{ marginBottom: 60 }}>
            <Label>Architecture</Label>
            <STitle size={48}>Two layers, <I>one</I> source of truth</STitle>
            <div style={{ maxWidth: 720, marginTop: 16 }}>
              <Body size={17}>Brand tokens describe what something <em>is</em> — our slate, red, yellow, green, and blue scales. Semantic tokens describe what something <em>does</em> — alert background, body text, nav surface. Components only ever reach into semantic tokens, never brand directly. That single rule is what lets a new light mode ship as a swap instead of a rebuild.</Body>
            </div>
          </div>

        useEffect(() => {
          const advance = () => {
            setFade(false);
            setTimeout(() => {
              setIdx(i => (i + 1) % MODE_PAIRS.length);
              requestAnimationFrame(() => requestAnimationFrame(() => setFade(true)));
            }, 420);
          };
          const timer = setInterval(advance, 4000);
          return () => clearInterval(timer);
        }, []);

        const goTo = (i) => {
          setFade(false);
          setTimeout(() => {
            setIdx(i);
            requestAnimationFrame(() => requestAnimationFrame(() => setFade(true)));

                <div style={{ display: "flex", flexDirection: "column", gap: 16, opacity: fade ? 1 : 0, transition: "opacity 0.42s ease", willChange: "opacity" }}>

      /* ─── SPACING ────────────────────────────────────────────────────── */
      const PLATFORM_TABS = [
        { key: "phone", label: "iPhone" },
        { key: "ipad",  label: "iPad" },
        { key: "web",   label: "Web" },

          </section>

      const TypographyLayer = () => {
        const isMobile = useIsMobile();

        <section style={{ padding: isMobile ? "20px var(--pad-h) 100px" : "20px 64px 100px", maxWidth: 1280, margin: "0 auto" }}>

                <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "38fr 62fr", gap: 28, alignItems: "start" }}>
                  <div style={{ background: IM.tile, border: `1px solid ${IM.line}`, borderRadius: 14, padding: "22px 24px" }}>
                    <p style={{ fontFamily: sans, fontSize: 14.5, lineHeight: 1.62, color: "rgba(231,236,243,0.78)", margin: "0 0 14px" }}>
                      A static spec can't capture motion. So the trickier interactions — the nav expand, the flight-card state machine, the auto-opening panel — ship as a <span style={{ color: IM.green, fontWeight: 600 }}>live coded sandbox</span> engineers can drop straight into the app.
                    </p>

                    <div style={{ display: "flex", flexDirection: "column", gap: 10, paddingTop: 18, borderTop: `1px solid ${IM.line}` }}>
                      {[["Android Studio", "Kotlin · Jetpack Compose", IM.green], ["Xcode", "Swift · SwiftUI", IM.blue]].map(([a, b, c]) => (
                        <div key={a} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                          <span style={{ width: 8, height: 8, borderRadius: 2, background: c, flexShrink: 0 }} />
                          <span style={{ fontFamily: sans, fontSize: 13, fontWeight: 600, color: IM.name }}>{a}</span>
                          <span style={{ fontFamily: mono, fontSize: 11, color: IM.muted }}>{b}</span>
                        </div>
                      ))}
                    </div>

                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 16, minWidth: 0 }}>
                    <div style={{ maxHeight: isMobile ? 280 : "none", overflow: "hidden", minWidth: 0 }}>
                      <IDEPanel os="Android" app="Android Studio" file="DynamicNavBar.kt" lang="Kotlin" accent={IM.green} lines={KOTLIN_LINES} />
                    </div>
                    <div style={{ maxHeight: isMobile ? 280 : "none", overflow: "hidden", minWidth: 0 }}>
                      <IDEPanel os="iOS" app="Xcode" file="DynamicNavBar.swift" lang="Swift" accent={IM.blue} lines={SWIFT_LINES} />
                    </div>
                  </div>
                </div>
              </IZone>

            </div>
          </section>
        );
      };

      /* ─── AI VALIDATION TERMINAL ─────────────────────────────────────── */
      const AIValidation = () => (
        <section style={{ padding: "var(--pad-v) var(--pad-h) 100px", maxWidth: 1280, margin: "0 auto" }}>
          <TwoCol
            left={<><Label>Quality gate</Label><STitle size={48}>The system <I>checks itself</I></STitle></>}
            right={<Body size={17}>The companies AI has been trained on the design system — tokens, components, usage rules, and accessibility requirements. Engineers can run their work against it without me in the room, and it flags anything that's off before it reaches review.</Body>}
          />
          <div style={{ marginTop: 48, background: "#0E1116", borderRadius: 18, padding: 32, fontFamily: mono, fontSize: 13, color: "#E8E2D4", boxShadow: "0 2px 20px rgba(0,0,0,0.2)", lineHeight: 1.8 }}>
            <div><span style={{ color: "#7DD3A0" }}>✓</span> 500+ tokens resolved across both modes (dark, light)</div>
            <div><span style={{ color: "#7DD3A0" }}>✓</span> 100+ components mapped to semantic layer · zero brand-direct refs</div>
            <div><span style={{ color: "#FFD27A" }}>!</span> button.cta failed WCAG AA on Yellow/200 · contrast 4.39 (need 4.5)</div>
            <div style={{ color: "rgba(232,226,212,0.5)", paddingLeft: 18 }}>↳ suggested: surface.warning content swap to HALO-Slate/E (7.82)</div>
            <div><span style={{ color: "#FF8B6B" }}>×</span> card padding uses raw value 14 — not in spacing scale</div>
            <div style={{ color: "rgba(232,226,212,0.5)", paddingLeft: 18 }}>↳ replace with padding/400 (12) or padding/500 (16)</div>
            <div><span style={{ color: "#7DD3A0" }}>✓</span> Typography roles resolve cleanly · Regular, Small, Large all in scale</div>
            <div><span style={{ color: "rgba(232,226,212,0.5)" }}>—</span> 1 warning · 1 blocker · review when ready</div>
          </div>
        </section>
      );

      /* ─── ADOPTION / IMPACT ──────────────────────────────────────────── */
      const Adoption = () => {
        const isMobile = useIsMobile();
        const isLandscape = useIsLandscape();
        return (
        <section style={{ padding: "var(--pad-v) var(--pad-h) 100px", maxWidth: 1280, margin: "0 auto" }}>
          <STitle size={48}>Impact</STitle>
          <div style={{ marginTop: 48, display: "grid", gridTemplateColumns: isMobile ? "1fr" : isLandscape ? "1fr 1fr" : "repeat(4, 1fr)", gap: 24 }}>
            {[
              ["10",    "engineers consuming the system across 3 platform teams"],
              ["75%",   "of components migrated to the system — engineers actively working to get to 100"],
              ["100%",  "of color and spacing updated to the token system across web and mobile"],
              ["1 swap","to ship light mode once the system was in place"],
            ].map(([n, d]) => (
              <div key={d} style={{ background: C.card, borderRadius: 18, padding: isMobile ? "24px 20px" : 32, boxShadow: "0 2px 12px rgba(0,0,0,0.06)" }}>
                <div style={{ fontFamily: sans, fontWeight: 700, fontSize: isMobile ? 36 : 48, color: C.coral, letterSpacing: "-0.04em", lineHeight: 1 }}>{n}</div>
                <div style={{ fontFamily: sans, fontSize: isMobile ? 13 : 14, color: C.ink2, marginTop: 16, lineHeight: 1.5 }}>{d}</div>
              </div>
            ))}
          </div>

          <div style={{ marginTop: 80 }}>
            <Label>What the team says</Label>
            <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr" : "1fr 1fr", gap: 24, marginTop: 24 }}>
              {[
                ["The implementation guidance and coded interactions make it so easy to transfer designs into the product. I know exactly how each element should behave.", "iOS Lead Engineer"],
                ["This system is so much more maintainable. I used to have 30 different hex codes for grey.", "Lead Web Engineer"],
              ].map(([q, a]) => (
                <div key={a}>
                  <div style={{ fontFamily: serif, fontStyle: "italic", fontSize: 56, color: C.coral, lineHeight: 0.5, marginBottom: 12 }}>"</div>
                  <div style={{ fontFamily: serif, fontStyle: "italic", fontSize: 22, color: C.ink, lineHeight: 1.4, marginBottom: 14 }}>{q}</div>
                  <div style={{ fontFamily: sans, fontSize: 12, color: C.ink3, letterSpacing: "0.1em", textTransform: "uppercase" }}>— {a}</div>
                </div>
              ))}
            </div>
          </div>
        </section>
        );
      };

      /* ─── PREV / NEXT ────────────────────────────────────────────────── */
      const NextUp = () => (
        <section style={{ padding: "var(--pad-v) var(--pad-h) 80px", maxWidth: 1280, margin: "0 auto" }}>
          <Rule />
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 24, paddingTop: 48 }}>
            <a href="product-definition.html" data-cursor="link" style={{ textDecoration: "none", color: "inherit" }}>
              <Label>← Previous</Label>
              <div style={{ fontFamily: serif, fontStyle: "italic", fontSize: 36, color: C.ink, lineHeight: 1.1 }}>Stakeholder-to-Feature Pipeline</div>
            </a>
            <a href="halo-for-jal.html" data-cursor="link" style={{ textDecoration: "none", color: "inherit", textAlign: "right" }}>
              <Label>Next case study →</Label>
              <div style={{ fontFamily: serif, fontStyle: "italic", fontSize: 36, color: C.coral, lineHeight: 1.1 }}>iPad Navigation & Core Flow</div>
            </a>
          </div>
        </section>
      );

      /* ─── FOOTER ─────────────────────────────────────────────────────── */
      const Footer = () => {
        const isMobile = useIsMobile();
        return (
          <footer id="contact" data-cursor="footer" style={{ padding: isMobile ? "48px var(--pad-h) 40px" : "160px var(--pad-h) 48px", borderTop: `1px solid ${C.rule}`, maxWidth: 1280, margin: "0 auto" }}>
            <div style={{ fontFamily: sans, fontWeight: 700, fontSize: "clamp(48px, 11vw, 180px)", letterSpacing: "-0.05em", lineHeight: 0.88, marginBottom: isMobile ? 32 : 60, textWrap: "balance" }}>
              Let's <span style={{ color: C.coral }}>talk</span>.
            </div>
            <div style={{ display: "grid", gridTemplateColumns: isMobile ? "1fr 1fr" : "1fr 1fr 1fr 1fr", gap: isMobile ? 24 : 32, paddingTop: 32, borderTop: `1px solid ${C.rule}` }}>
              <div><Label>Email</Label><a href="mailto:christinajdoolan@gmail.com" data-cursor="link" style={{ fontFamily: sans, fontSize: 18, color: C.ink, textDecoration: "none", fontWeight: 500, letterSpacing: "-0.01em" }}>christinajdoolan@gmail.com</a></div>
              <div><Label>LinkedIn</Label><a href="https://www.linkedin.com/in/christina-doolan-36b1a224a/" data-cursor="link" style={{ fontFamily: sans, fontSize: 18, color: C.ink, textDecoration: "none", fontWeight: 500, letterSpacing: "-0.01em" }}>/christina-doolan</a></div>
              <div><Label>Resume</Label><a href="index.html#resume" data-cursor="link" style={{ fontFamily: sans, fontSize: 18, color: C.ink, textDecoration: "none", fontWeight: 500, letterSpacing: "-0.01em" }}>View resume →</a></div>
              <div style={{ textAlign: "right" }}><Label>Christina Doolan</Label><div style={{ fontFamily: sans, fontSize: 18, color: C.ink, fontWeight: 500, fontVariantNumeric: "tabular-nums" }}>2026 ©</div></div>
            </div>
          </footer>
        );
      };

      /* ─── PAGE ───────────────────────────────────────────────────────── */
      const CaseStudy2 = () => {
        const containerRef = useRef(null);
        const [showTop, setShowTop] = useState(false);
        const [isMobile, setIsMobile] = useState(window.innerWidth < 680);
        const [isLandscape, setIsLandscape] = useState(window.innerWidth >= 680 && window.innerWidth < 1024);

        useEffect(() => {
          const onScroll = () => setShowTop(window.scrollY > 400);
          window.addEventListener("scroll", onScroll, { passive: true });
          return () => window.removeEventListener("scroll", onScroll);
        }, []);

        useEffect(() => {
          const fn = () => {
            setIsMobile(window.innerWidth < 680);
            setIsLandscape(window.innerWidth >= 680 && window.innerWidth < 1024);
          };
          window.addEventListener("resize", fn);
          return () => window.removeEventListener("resize", fn);
        }, []);

        return (
          <MobileCtx.Provider value={isMobile}><LandscapeCtx.Provider value={isLandscape}>
          <div ref={containerRef} style={{ background: C.bg, color: C.ink, position: "relative", overflowX: "hidden" }}>
            <GlobalNav onNavigate={(t) => { window.location.href = t === "home" ? "index.html" : `index.html#${t}`; }} />
            <Hero containerRef={containerRef} />
            <Overview />
            <Architecture />
            <Modes />
            <BrandLayer />
            <SemanticLayer />
            <SpacingLayer />
            <TypographyLayer />
            <Library />
            <Implementation />
            <AIValidation />
            <Adoption />
            <NextUp />
            <Footer />

            {showTop && (
              <button data-cursor="link" onClick={() => window.scrollTo({ top: 0, behavior: "smooth" })}
                style={{ position: "fixed", bottom: 24, right: 24, width: 44, height: 44, borderRadius: "50%", background: "#fff", border: `1px solid ${C.rule}`, cursor: "pointer", fontFamily: sans, fontSize: 18, color: C.ink, zIndex: 20, display: "flex", alignItems: "center", justifyContent: "center" }}>
                ↑
              </button>
            )}
          </div>
          </LandscapeCtx.Provider></MobileCtx.Provider>
        );
      };

      const PasswordGate = ({ children }) => {
        const [unlocked, setUnlocked] = React.useState(() => localStorage.getItem('cs_auth') === 'ok');
        const [val, setVal] = React.useState('');
        const [err, setErr] = React.useState(false);
        if (unlocked) return children;
        const submit = (e) => {
          e.preventDefault();
          if (val === 'casestudies') { localStorage.setItem('cs_auth', 'ok'); setUnlocked(true); }
          else { setErr(true); setVal(''); }
        };
        return (
          <div style={{ minHeight:'100vh', background:'#F2EEE6', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', fontFamily:'"Inter Tight", system-ui, sans-serif', cursor:'default' }}>
            <div style={{ marginBottom:12, fontSize:11, letterSpacing:'0.18em', textTransform:'uppercase', color:'rgba(10,14,26,0.45)' }}>Portfolio · Protected</div>
            <div style={{ fontSize:36, fontWeight:700, letterSpacing:'-0.03em', color:'#0A0E1A', marginBottom:10 }}>Enter password</div>
            <div style={{ fontSize:16, color:'rgba(10,14,26,0.55)', marginBottom:44 }}>This case study is password protected.</div>
            <form onSubmit={submit} style={{ display:'flex', flexDirection:'column', gap:12, width:320 }}>
              <input type="password" value={val} onChange={e => { setVal(e.target.value); setErr(false); }} placeholder="Password" autoFocus
                style={{ padding:'14px 18px', borderRadius:12, border:`1.5px solid ${err ? '#FF5C2A' : 'rgba(10,14,26,0.18)'}`, background:'#fff', fontSize:16, color:'#0A0E1A', outline:'none', fontFamily:'"Inter Tight", system-ui, sans-serif' }} />
              {err && <div style={{ fontSize:13, color:'#FF5C2A' }}>Incorrect password — try again.</div>}
              <button type="submit" style={{ padding:'14px', borderRadius:12, background:'#0A0E1A', color:'#F2EEE6', fontSize:13, fontWeight:600, letterSpacing:'0.1em', textTransform:'uppercase', border:'none', cursor:'pointer', fontFamily:'"Inter Tight", system-ui, sans-serif' }}>Unlock →</button>
            </form>
          </div>
        );
      };
      ReactDOM.createRoot(document.getElementById("root")).render(<PasswordGate><CaseStudy2 /></PasswordGate>);
    </script>
  </body>
</html>
